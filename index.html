<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VM 2026">
  <title>VM-Kampprogram 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="trophy.png">
  <style>
    @font-face{font-family:'Press Start 2P';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/d85064eaed4b8683-s.woff2') format('woff2');unicode-range:u+0100-02ba,u+02bd-02c5,u+02c7-02cc,u+02ce-02d7,u+02dd-02ff,u+0304,u+0308,u+0329,u+1d00-1dbf,u+1e00-1e9f,u+1ef2-1eff,u+2020,u+20a0-20ab,u+20ad-20c0,u+2113,u+2c60-2c7f,u+a720-a7ff}
    @font-face{font-family:'Press Start 2P';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/db234bd00cda6a96-s.p.woff2') format('woff2');unicode-range:u+00??,u+0131,u+0152-0153,u+02bb-02bc,u+02c6,u+02da,u+02dc,u+0304,u+0308,u+0329,u+2000-206f,u+20ac,u+2122,u+2191,u+2193,u+2212,u+2215,u+feff,u+fffd}
    @font-face{font-family:'VT323';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/751eccb0decf5e18-s.woff2') format('woff2');unicode-range:u+0102-0103,u+0110-0111,u+0128-0129,u+0168-0169,u+01a0-01a1,u+01af-01b0,u+0300-0301,u+0303-0304,u+0308-0309,u+0323,u+0329,u+1ea0-1ef9,u+20ab}
    @font-face{font-family:'VT323';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/f6590a0f07a97750-s.woff2') format('woff2');unicode-range:u+0100-02ba,u+02bd-02c5,u+02c7-02cc,u+02ce-02d7,u+02dd-02ff,u+0304,u+0308,u+0329,u+1d00-1dbf,u+1e00-1e9f,u+1ef2-1eff,u+2020,u+20a0-20ab,u+20ad-20c0,u+2113,u+2c60-2c7f,u+a720-a7ff}
    @font-face{font-family:'VT323';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/b7bd7951037de757-s.p.woff2') format('woff2');unicode-range:u+00??,u+0131,u+0152-0153,u+02bb-02bc,u+02c6,u+02da,u+02dc,u+0304,u+0308,u+0329,u+2000-206f,u+20ac,u+2122,u+2191,u+2193,u+2212,u+2215,u+feff,u+fffd}

    *,*::before,*::after{box-sizing:border-box;border:0 solid;margin:0;padding:0}
    h1,h2,h3,h4,h5,h6{font-size:inherit;font-weight:inherit}ol,ul{list-style:none}
    img{display:block;max-width:100%;height:auto}button{cursor:pointer;font-family:inherit;background:none;touch-action:manipulation}
    button,[data-midx],[data-team],[data-st],[data-view]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    table{border-collapse:collapse}:root{color-scheme:dark}
    body{font-family:'VT323',ui-monospace,monospace;background:#056cc3;color:#f4ecc8;
      -webkit-font-smoothing:antialiased;font-size:21px;line-height:1.35;min-height:100vh}
    .stadium-bg{position:fixed;top:0;right:0;bottom:0;left:0;z-index:-2;background:#056cc3 url('stadium.png') top/cover no-repeat;image-rendering:pixelated}
    .stadium-overlay{position:fixed;inset:0;z-index:-1;
      background:radial-gradient(120% 60% at 50% 0,rgba(246,212,90,.12),transparent 55%),
      linear-gradient(180deg,rgba(8,22,8,.15),rgba(8,20,8,.45) 38%,rgba(5,14,5,.86))}

    /* ── PIXEL DESIGN ── */
    .logo-text{font-family:'Press Start 2P',monospace;color:#f6d45a;letter-spacing:.01em;line-height:1.1;
      text-shadow:-3px 0 0 #3a2a0c,3px 0 0 #3a2a0c,0 -3px 0 #3a2a0c,0 3px 0 #3a2a0c,3px 3px 0 #b87d26,5px 5px 0 #6e4a16,9px 10px 0 rgba(0,0,0,.45)}
    .pixel-panel{background:linear-gradient(180deg,#2c5625,#214b1f 58%,#19390f);border:3px solid #e8be4a;
      box-shadow:0 0 0 3px #6e4a16,inset 0 0 0 2px rgba(246,212,90,.18),6px 8px 0 rgba(0,0,0,.45);overflow:hidden}
    .group-header{font-family:'Press Start 2P',monospace;
      background:linear-gradient(180deg,#f6d45a,#e8be4a 50%,#d7a13b);color:#4a3208;
      border-bottom:3px solid #6e4a16;text-shadow:0 1px 0 rgba(255,255,255,.35);padding:.45rem .75rem;font-size:11px}
    .flag-img   {image-rendering:pixelated;display:inline-block;flex-shrink:0;border:1px solid rgba(0,0,0,.4);width:36px;height:24px}
    .flag-img-sm{image-rendering:pixelated;display:inline-block;flex-shrink:0;border:1px solid rgba(0,0,0,.4);width:27px;height:18px}
    .flag-img-xs{image-rendering:pixelated;display:inline-block;flex-shrink:0;border:1px solid rgba(0,0,0,.4);width:20px;height:14px}
    .flag-img-lg{image-rendering:pixelated;display:inline-block;flex-shrink:0;border:1px solid rgba(0,0,0,.4);width:60px;height:40px}

    @keyframes btn-blink{
      from{filter:brightness(1.25);text-shadow:0 0 6px rgba(255,255,255,.35)}
      to  {filter:brightness(1.75) drop-shadow(0 0 5px rgba(246,212,90,.85));text-shadow:0 0 12px rgba(255,255,255,.8)}
    }
    @keyframes btn-blink-sm{
      from{filter:brightness(1.2)}
      to  {filter:brightness(1.65) drop-shadow(0 0 4px rgba(246,212,90,.7))}
    }
    /* Filter buttons */
    .fbtn{font-family:'Press Start 2P',monospace;text-transform:uppercase;font-size:8px;padding:.28rem .5rem;
      border-width:2px;border-style:solid;box-shadow:2px 3px 0 rgba(0,0,0,.55);
      transition:transform .08s,box-shadow .08s;
      background:#1a2e1a;color:rgba(244,236,200,.5);border-color:#2e4a2e #0d1a0d #0d1a0d #2e4a2e}
    .fbtn:hover{
      transform:translateY(-2px);
      box-shadow:2px 5px 0 rgba(0,0,0,.6),0 0 6px rgba(246,212,90,.3);
      animation:btn-blink-sm .3s linear alternate infinite}
    .fbtn:active{transform:translate(2px,2px);box-shadow:0 0;filter:brightness(.9);animation:none}
    .fbtn.fi{background:#c06000;color:#fff;border-color:#f08020 #7a3a00 #7a3a00 #f08020}
    .fbtn.fa{background:#e8be4a;color:#3a2a0c;border-color:#f6d45a #b87d26 #b87d26 #f6d45a}
    .fbtn.ff{background:#2e6329;color:#f4ecc8;border-color:#4a8a3c #16330f #16330f #4a8a3c}
    .fbtn.fk{background:#4c8fcb;color:#fff;border-color:#8fc0e8 #2c6699 #2c6699 #8fc0e8}
    .fbtn.fn{background:#ba0c2f;color:#fff;border-color:#e2415c #7a0820 #7a0820 #e2415c}
    .fbtn.fg{background:#e8be4a;color:#3a2a0c;border-color:#f6d45a #b87d26 #b87d26 #f6d45a}
    .fbtn.fz{background:#6b3fa0;color:#fff;border-color:#9b6fd0 #3d1f60 #3d1f60 #9b6fd0}
    .fsep{display:inline-block;width:1px;height:14px;background:rgba(232,190,74,.25);margin:0 .15rem;align-self:center}
    .view-nav{margin-top:1.5rem;display:flex;gap:.4rem;flex-wrap:wrap}
    .vbtn{font-family:'Press Start 2P',monospace;text-transform:uppercase;border-width:3px;border-style:solid;
      font-size:10px;padding:.45rem .7rem;box-shadow:4px 5px 0 rgba(0,0,0,.6);
      transition:transform .08s,box-shadow .08s}
    .vbtn:hover{
      transform:translateY(-3px);
      box-shadow:4px 8px 0 rgba(0,0,0,.7),0 0 12px rgba(246,212,90,.4);
      animation:btn-blink .3s linear alternate infinite}
    .vbtn:active{transform:translate(4px,4px);box-shadow:0 0;filter:brightness(.85);animation:none}
    .vbtn.off{background:#1a2e1a;color:rgba(244,236,200,.5);border-color:#2e4a2e #0d1a0d #0d1a0d #2e4a2e}
    .vbtn.on-forside{background:#c06000;color:#fff;border-color:#f08020 #7a3a00 #7a3a00 #f08020}
    .vbtn.on-kampprogram{background:#e8be4a;color:#3a2a0c;border-color:#f6d45a #b87d26 #b87d26 #f6d45a}
    .vbtn.on-kalender{background:#2e6329;color:#f4ecc8;border-color:#4a8a3c #16330f #16330f #4a8a3c}
    .vbtn.on-grupper{background:#6b3fa0;color:#fff;border-color:#9b6fd0 #3d1f60 #3d1f60 #9b6fd0}
    .vbtn.on-sluttspill{background:#4c8fcb;color:#fff;border-color:#8fc0e8 #2c6699 #2c6699 #8fc0e8}
    .vbtn.on-statistikk{background:#1a7a6e;color:#fff;border-color:#2ab8a8 #0d4a45 #0d4a45 #2ab8a8}
    /* Forside layout */
    .forside-duo{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem;align-items:stretch}
    .forside-duo .pixel-panel{display:flex;flex-direction:column}
    .forside-duo .pixel-panel>div:last-child{flex:1;display:flex;flex-direction:column;gap:.35rem;padding-bottom:.35rem}
    .forside-duo .match-card{flex:1;margin-bottom:0}
    @media(max-width:600px){.forside-duo{grid-template-columns:1fr}}
    .filter-row{margin-top:.55rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
    .flabel{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(244,236,200,.45);margin-right:.1rem}
    .container{max-width:1280px;margin:0 auto;padding:env(safe-area-inset-top) 1.25rem 4rem}
    header{padding:2.25rem 0 1.25rem;text-align:center}
    .trophy-img{image-rendering:pixelated;width:auto;height:120px;margin:0 auto .7rem;filter:drop-shadow(0 8px 0 rgba(0,0,0,.35))}
    .header-sub{font-size:18px;color:rgba(244,236,200,.7);margin-top:.6rem}
    #subHeader{display:none;align-items:center;gap:.6rem;padding:.8rem 0 .5rem}
    #subHeader img{height:52px;width:auto;image-rendering:pixelated;filter:drop-shadow(0 3px 0 rgba(0,0,0,.4))}
    #subHeader h2{font-family:'Press Start 2P',monospace;font-size:clamp(1.05rem,4vw,2.3rem);color:#f6d45a;text-shadow:2px 2px 0 rgba(0,0,0,.55);line-height:1.2}
    @media(max-width:480px){#subHeader img{height:40px}}

    /* Heia Norge */
    .norge-section{margin-top:1.5rem}.norge-grid{display:grid;gap:.6rem}
    @media(min-width:600px){.norge-grid{grid-template-columns:repeat(3,1fr)}}
    .norge-mini{background:linear-gradient(180deg,#5c2525,#4b1a1a 58%,#390f0f);border:2px solid #e8be4a;box-shadow:0 0 0 2px #6e4a16,3px 4px 0 rgba(0,0,0,.4);padding:.5rem .65rem}
    .mini-date{font-family:'Press Start 2P',monospace;font-size:11px;color:rgba(244,236,200,.55);margin-bottom:.3rem}
    .mini-teams{display:flex;align-items:center;gap:.35rem;font-size:25px;flex-wrap:wrap}
    .mini-res{font-size:28px;margin-top:.1rem}
    .c-win{color:#5ae05a}.c-draw{color:#f6d45a}.c-loss{color:#e05a5a}.c-muted{color:rgba(244,236,200,.45)}

    /* Match card */
    .match-card{background:linear-gradient(180deg,#2c5625,#214b1f 58%,#19390f);
      border:2px solid #e8be4a;box-shadow:0 0 0 2px #6e4a16,inset 0 0 0 1px rgba(246,212,90,.09),3px 4px 0 rgba(0,0,0,.38);
      margin-bottom:.35rem;padding:.65rem .7rem .3rem;cursor:pointer;position:relative;
      display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.35rem;
      transition:transform .08s,box-shadow .08s,filter .08s}
    .match-card.nc{background:linear-gradient(180deg,#5c2525,#4b1a1a 58%,#390f0f)}
    .match-card.kc{border-color:#f6d45a}
    .match-card:hover{filter:brightness(1.18);transform:translateY(-2px);box-shadow:0 0 0 2px #6e4a16,inset 0 0 0 1px rgba(246,212,90,.12),3px 6px 0 rgba(0,0,0,.5),0 0 10px rgba(232,190,74,.2)}
    .match-card:active{transform:translate(3px,4px);box-shadow:0 0 0 2px #6e4a16;filter:brightness(.95)}
    .mc-grp{position:absolute;top:3px;left:6px;font-family:'Press Start 2P',monospace;font-size:6px;color:rgba(232,190,74,.45);white-space:nowrap;pointer-events:none}
    .ts{display:flex;align-items:center;gap:.4rem;min-width:0}
    .ts.r{flex-direction:row-reverse;text-align:right}
    .tn{font-size:21px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tn.no{color:#f6d45a}
    .mc{text-align:center;min-width:78px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
    .mc-time{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(244,236,200,.38);margin-bottom:1px}
    .ms{font-family:'Press Start 2P',monospace;font-size:20px;color:#f6d45a;letter-spacing:.05em}
    .mt{font-family:'Press Start 2P',monospace;font-size:12px;color:rgba(244,236,200,.8);margin-bottom:2px}
    .mb{display:inline-block;font-family:'Press Start 2P',monospace;font-size:9px;padding:.15rem .4rem;margin-top:.18rem}
    .b-fin{background:rgba(22,163,74,.3);color:#5ae05a;border:1px solid #5ae05a}
    .b-idag{background:rgba(192,96,0,.35);color:#f08020;border:1px solid #f08020}
    .b-kom{background:rgba(0,0,0,.3);color:rgba(244,236,200,.4);border:1px solid rgba(244,236,200,.18)}
    .match-list{margin-top:1.25rem}.date-sec{margin-bottom:1.1rem}

    /* ═══════════════════════════════════════════════
       MATCH MODAL
    ═══════════════════════════════════════════════ */
    #matchModal{position:fixed;inset:0;z-index:504;display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.85);padding:1rem;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
    .modal-card{max-width:580px;width:100%;max-height:92vh;overflow-y:auto;position:relative;
      padding:1.1rem 1.2rem 1.4rem;scrollbar-width:thin;scrollbar-color:#e8be4a #1a2e1a}
    .modal-card::-webkit-scrollbar{width:6px}
    .modal-card::-webkit-scrollbar-track{background:#1a2e1a}
    .modal-card::-webkit-scrollbar-thumb{background:#e8be4a;border-radius:0}
    .modal-close-btn{position:absolute;top:.55rem;right:.55rem;
      font-family:'Press Start 2P',monospace;font-size:8px;
      background:#ba0c2f;color:#fff;border:2px solid #e2415c;border-bottom-color:#7a0820;border-right-color:#7a0820;
      padding:.3rem .55rem;box-shadow:2px 2px 0 rgba(0,0,0,.5);transition:filter .1s}
    .modal-close-btn:hover{filter:brightness(1.2)}

    /* Modal header */
    .modal-badge{font-family:'Press Start 2P',monospace;font-size:8px;
      background:linear-gradient(180deg,#f6d45a,#e8be4a 50%,#d7a13b);color:#4a3208;
      padding:.25rem .65rem;display:inline-block;margin-bottom:.5rem}
    .modal-meta{font-size:16px;color:rgba(244,236,200,.65);margin-bottom:.2rem}
    .modal-venue{font-size:16px;color:rgba(244,236,200,.45);margin-bottom:.8rem}

    /* Match score area */
    .modal-score-area{
      display:grid;grid-template-columns:1fr auto 1fr;
      align-items:start;gap:.5rem;margin:.5rem 0 .8rem}
    .modal-team-col{display:flex;flex-direction:column;align-items:center;gap:.4rem;text-align:center}
    .modal-tname{font-size:23px;line-height:1.1}
    .modal-tname.no{color:#f6d45a}
    .modal-team-col.win .modal-tname{color:#5ae05a}
    .modal-ctr-col{text-align:center;flex-shrink:0;padding-top:.2rem}
    .modal-ft{font-family:'Press Start 2P',monospace;font-size:26px;color:#f6d45a;line-height:1}
    .modal-ht{font-size:14px;color:rgba(244,236,200,.45);margin-top:.3rem}
    .modal-status{font-size:14px;margin-top:.2rem}
    .modal-status.fin{color:#5ae05a}
    .modal-status.tod{color:#f08020}
    .modal-vs{font-family:'Press Start 2P',monospace;font-size:15px;color:rgba(244,236,200,.35);margin:.3rem 0}
    .modal-stime{font-family:'Press Start 2P',monospace;font-size:11px;color:#f4ecc8;margin-top:.2rem}

    /* Events section */
    .ev-section{margin-top:.8rem;border-top:1px solid rgba(232,190,74,.2);padding-top:.7rem}
    .ev-hdr{font-family:'Press Start 2P',monospace;font-size:8px;color:rgba(244,236,200,.5);
      margin-bottom:.5rem;letter-spacing:.05em}
    .ev-grid{display:grid;grid-template-columns:1fr 44px 1fr;gap:0}
    .ev-row{display:contents}
    .ev-l{padding:2px 4px 2px 0;font-size:16px;text-align:right;line-height:1.3;color:rgba(244,236,200,.85)}
    .ev-m{padding:2px 2px;font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(244,236,200,.4);
      text-align:center;white-space:nowrap;line-height:1.9}
    .ev-r{padding:2px 0 2px 4px;font-size:16px;text-align:left;line-height:1.3;color:rgba(244,236,200,.85)}
    .ev-row:hover .ev-l,.ev-row:hover .ev-m,.ev-row:hover .ev-r{background:rgba(246,212,90,.05)}
    .ev-goal-cell{font-size:18px;padding-top:5px;padding-bottom:5px;background:rgba(246,212,90,.09);color:#f4ecc8}
    .ev-goal-mid{color:#f6d45a!important;background:rgba(246,212,90,.09)}
    .ev-in{color:#8feda0}
    .ev-out{color:#f08080}
    /* Simple list (no team info) */
    .ev-list-item{font-size:16px;color:rgba(244,236,200,.82);padding:2px 0;line-height:1.35}
    .ev-min{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(244,236,200,.4);padding-left:.3rem}
    .ev-none{font-size:15px;color:rgba(244,236,200,.3);padding:.3rem 0}

    .nrk-thumb-wrap{margin-top:.9rem;border-top:1px solid rgba(232,190,74,.2);padding-top:.7rem}
    .nrk-thumb{display:block;position:relative;cursor:pointer;text-decoration:none}
    .nrk-thumb img{width:100%;display:block;border:2px solid rgba(232,190,74,.25);image-rendering:auto}
    .nrk-thumb-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.35)}
    .nrk-thumb:hover .nrk-thumb-play{background:rgba(0,0,0,.2)}
    .nrk-thumb-play-icon{width:54px;height:54px;background:#f6d45a;
      display:flex;align-items:center;justify-content:center;
      border:3px solid #2a1c00;box-shadow:5px 5px 0 #2a1c00;
      font-family:'Press Start 2P',monospace;font-size:20px;color:#2a1c00;
      padding-left:4px;line-height:1;image-rendering:pixelated}
    .nrk-thumb:hover .nrk-thumb-play-icon{transform:translate(3px,3px);box-shadow:2px 2px 0 #2a1c00}
    .nrk-thumb-lbl{font-family:'Press Start 2P',monospace;font-size:8px;color:rgba(246,212,90,.7);
      text-align:center;margin-top:.45rem;letter-spacing:.05em}

    /* ═══════════════════════════════
       KALENDER
    ═══════════════════════════════ */
    .cal-wrap{margin-top:1rem;display:flex;flex-direction:column;gap:1.5rem}
    .cal-month-hdr{font-size:18px;text-align:center;padding:.5rem}
    .cal-grid{display:grid;gap:3px;margin-top:3px}
    .cal-head{font-family:'Press Start 2P',monospace;font-size:10px;color:#4a3208;
      background:linear-gradient(180deg,#f6d45a,#e8be4a 50%,#d7a13b);
      text-align:center;padding:.4rem .1rem;border-bottom:2px solid #6e4a16}
    .cal-day{background:linear-gradient(180deg,#1e3d19,#172f12);border:1.5px solid rgba(232,190,74,.28);padding:5px 4px;overflow:hidden}
    .cal-day.empty{background:rgba(0,0,0,.14);border-color:rgba(232,190,74,.07)}
    .cal-day.today{border-color:#f6d45a;border-width:2px;box-shadow:0 0 0 1.5px #6e4a16}
    .cal-num{font-family:'Press Start 2P',monospace;font-size:9px;color:rgba(244,236,200,.38);margin-bottom:5px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cal-num.tday{color:#f6d45a}
    .cal-mrow{display:flex;align-items:center;justify-content:space-between;gap:2px;margin-bottom:2px;
      padding:2px 3px;background:rgba(0,0,0,.22);border-left:2px solid transparent;overflow:hidden;
      cursor:pointer;transition:filter .1s}
    .cal-mrow:hover{filter:brightness(1.3)}
    .cal-mrow.m-nor{background:rgba(186,12,47,.28);border-left-color:#e2415c}
    .cal-mrow.m-ko{background:rgba(76,143,203,.18);border-left-color:#4c8fcb}
    .cal-mrow.m-fin{opacity:.8}
    .cal-side{display:flex;align-items:center;gap:2px;flex:1;min-width:0}

ran+New Zealand':['ISPO40561626','https://gfx.nrk.no/QhcUNxeyFUlcBrCFQCAHWgG8qu5whhDmRvll_Ud3UgSw'],'Iraq+Norway':['ISPO40561826','https://gfx.nrk.no/24-iRyRAOSWe_XOPMmyedwDwCGLcs8XEwGoBvMJAfhnQ'],'Iraq+Senegal':['ISPO40566226','https://gfx.nrk.no/8bLFX8NybcFgP_aRo6JeMgaDpRkSxplZOrgombOywoIw'],'Japan+Netherlands':['ISPO40561026','https://gfx.nrk.no/xaRJcdlJbDsILDyFiXITnQW6Br4SL0hDD3aiVZP_rTmA'],'Japan+Sweden':['ISPO40565826','https://gfx.nrk.no/8pKOLgnPK5ANHbtoJn13LQ8oDUWDYR04_NbIIrNSArpg'],'Japan+Tunisia':['ISPO40563626','https://gfx.nrk.no/th0aX3qxius4qyaroYKYvAy0CyGjfJlw9vQWvHD-Yf9g'],'Norway+Senegal':['ISPO40564326','https://gfx.nrk.no/9k3pHankodQlmxCUYfbtqwHH-XV2ehYaGEU-xX-FogUQ']};
let nrkExtra={};
function getNRKData(m){
  const key=[m.team1,m.team2].sort().join('+');
  const s=NRK_HIGHLIGHTS[key];if(s)return{id:s[0],img:s[1]};
  if(nrkExtra[key])return nrkExtra[key];
  return null;
}
async function fetchNRKHighlights(){
  const cached=cacheGet('nrk_hl_v4',3600*1000);
  if(cached){nrkExtra=cached;return}
  try{
    const r=await fetch('https://psapi.nrk.no/tv/catalog/series/fotball-vm-2026-hoeydepunkter/seasons/2026');
    const d=await r.json();
    const map={};
    for(const ep of d._embedded?.instalments||[]){
      const title=(ep.titles?.title||'').replace(/^[^–]+,\s*/,'');
      const pts=title.split('–');
      if(pts.length===2){
        const k=[nrkToEspn(pts[0].trim()),nrkToEspn(pts[1].trim())].sort().join('+');
        const img=(ep.image||[]).find(i=>i.width===600)?.url||(ep.image||[])[0]?.url||'';
        map[k]={id:ep.prfId,img};
      }
    }
    if(Object.keys(map).length){nrkExtra=map;cacheSet('nrk_hl_v4',map);}
  }catch{}
}

const SLUG_TO_ROUND={'round-of-32':'Round of 32','round-of-16':'Round of 16',
  'quarterfinals':'Quarterfinals','semifinals':'Semifinals',
  'third-place':'3rd Place','final':'Final'};

let espnTeamGroups={}; // teamId → "Group A"
async function loadESPNGroups(){
  // Fast path: use static ESPN_GROUPS + ESPN_TEAMS from espn-data.js
  if(typeof ESPN_GROUPS!=='undefined'&&typeof ESPN_TEAMS!=='undefined'){
    Object.entries(ESPN_GROUPS).forEach(([tName,gName])=>{
      const id=String(ESPN_TEAMS[tName]?.id||'');
      if(id)espnTeamGroups[id]=gName;
    });
    return;
  }
  // Fallback: fetch from standings API
  const cached=cacheGet('espn_groups_v2',24*3600*1000);
  if(cached){espnTeamGroups=cached;return}
  try{
    const r=await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026');
    const d=await r.json();
    const map={};
    (d.children||[]).forEach(grp=>{
      const gName=grp.name;
      (grp.standings?.entries||[]).forEach(e=>{if(e.team?.id)map[String(e.team.id)]=gName});
    });
    espnTeamGroups=map;
    if(Object.keys(map).length)cacheSet('espn_groups_v2',map);
  }catch{}
}

function mapESPNEvent(ev){
  const comp=ev.competitions?.[0];if(!comp)return null;
  const home=comp.competitors?.find(c=>c.homeAway==='home');
  const away=comp.competitors?.find(c=>c.homeAway==='away');
  if(!home||!away)return null;
  const t1=espnTeamCanonical(home.team.displayName);
  const t2=espnTeamCanonical(away.team.displayName);
  const st=comp.status?.type;
  const state=st?.state;
  const isPost=state==='post',isIn=state==='in';
  const sc1=isPost||isIn?parseInt(home.score||'0'):null;
  const sc2=isPost||isIn?parseInt(away.score||'0'):null;
  const iso=ev.date||comp.date||'';
  const dateStr=iso.split('T')[0];
  const tPart=iso.split('T')[1]||'00:00Z';
  const[hh,mm]=(tPart||'').split(':');
  const time=`${(hh||'00').padStart(2,'0')}:${(mm||'00').padStart(2,'0')} UTC+0`;
  const slug=ev.season?.slug||'';
  // Group: look up from team ID (standings API), slug == 'group-stage'
  const t1id=String(home.team?.id||'');
  const t2id=String(away.team?.id||'');
  const group=slug==='group-stage'?(espnTeamGroups[t1id]||espnTeamGroups[t2id]||null):null;
  const round=!group?(SLUG_TO_ROUND[slug]||null):null;
  const ground=comp.venue?.fullName||null;
  let status='';
  if(isPost)status='FT';
  else if(isIn)status=comp.status?.displayClock||'live';
  const liveMin=isIn?comp.status?.displayClock?.replace("'",''):null;
  return{
    _espnId:ev.id,date:dateStr,time,team1:t1,team2:t2,
    group,round,ground,status,live_minute:liveMin,
    score:(isPost||isIn)&&sc1!==null?{ft:[sc1,sc2]}:null,
    goals1:[],goals2:[],cards:[]
  };
}

async function loadAllESPNMatches(){
  const cached=cacheGet('espn_all_v2',5*60*1000);
  if(cached)return cached;
  const dates=[];
  for(let d=new Date('2026-06-11');d<=new Date('2026-07-23');d.setUTCDate(d.getUTCDate()+1)){
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }
  const BATCH=8,allEvs=[];
  for(let i=0;i<dates.length;i+=BATCH){
    const res=await Promise.all(dates.slice(i,i+BATCH).map(d=>getESPNScoreboard(d)));
    allEvs.push(...res.flat());
  }
  const seen=new Set();
  const evs=allEvs.filter(e=>{if(!e.id||seen.has(e.id))return false;seen.add(e.id);return true});
  if(evs.length)cacheSet('espn_all_v2',evs);
  return evs;
}

async function fetchLiveMatches(){
  try{
    const todayStr=new Date().toISOString().slice(0,10).replace(/-/g,'');
    delete espnScoreboardCache[todayStr];
    const evs=await getESPNScoreboard(todayStr);
    // Also fetch yesterday if it's early morning (matches may still be updating)
    const h=new Date().getUTCHours();
    if(h<7){
      const yd=new Date();yd.setUTCDate(yd.getUTCDate()-1);
      const ydStr=yd.toISOString().slice(0,10).replace(/-/g,'');
      delete espnScoreboardCache[ydStr];
      const ydEvs=await getESPNScoreboard(ydStr);
      applyScoreboardToMatches(ydEvs);
    }
    const snapBefore=JSON.stringify(allMatches.map(m=>m._espnId+m.status+JSON.stringify(m.score)));
    liveMatches=evs.filter(e=>e.competitions?.[0]?.status?.type?.state==='in').map(mapESPNEvent).filter(Boolean);
    applyScoreboardToMatches(evs);
    const snapAfter=JSON.stringify(allMatches.map(m=>m._espnId+m.status+JSON.stringify(m.score)));
    if(snapBefore!==snapAfter||liveMatches.length){
      computeGoals();computeAssists();computeCards();

    }

}

/* ── TIME ── */
function parseDT(ds,ts){
  if(!ts||!ds)return null;
  const m=ts.match(/^(\d{2}):(\d{2})\s+UTC([+-]\d+(?:\.\d+)?)$/);
  if(!m)return null;
  const[,h,mi,off]=m,o=parseFloat(off),sign=o>=0?'+':'-';
  const ah=String(Math.floor(Math.abs(o))).padStart(2,'0');
  const am=String(Math.round((Math.abs(o)%1)*60)).padStart(2,'0');
  try{return new Date(`${ds}T${h}:${mi}:00${sign}${ah}:${am}`)}catch{return null}
}
function osloStr(dt){return dt?dt.toLocaleString('sv-SE',{timeZone:'Europe/Oslo'}):null}
function osloDate(dt){const s=osloStr(dt);return s?s.slice(0,10):null}
function osloHour(dt){const s=osloStr(dt);return s?parseInt(s.slice(11,13)):null}
function fmtTime(dt){return dt?dt.toLocaleTimeString('nb-NO',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Oslo'}):'?'}
function fmtLong(dt){return dt?cap(dt.toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long',timeZone:'Europe/Oslo'})):'?'}
function fmtShort(dt){return dt?dt.toLocaleDateString('nb-NO',{day:'numeric',month:'short',timeZone:'Europe/Oslo'}):'?'}
function todayStr(){return new Date().toLocaleString('sv-SE',{timeZone:'Europe/Oslo'}).slice(0,10)}
function calToday(){
  const now=new Date(),h=osloHour(now);
  if(h!==null&&h<7){const d=new Date(now);d.setDate(d.getDate()-1);return d.toLocaleString('sv-SE',{timeZone:'Europe/Oslo'}).slice(0,10)}
  return todayStr()
}
function calDate(m){
  const dt=parseDT(m.date,m.time);
  if(!dt)return m.date||'';
  const h=osloHour(dt),d=osloDate(dt);
  if(h!==null&&h<7){const p=new Date(d+'T12:00:00');p.setDate(p.getDate()-1);return p.toISOString().slice(0,10)}
  return d||m.date||'';
}
const byTime=(a,b)=>{const da=parseDT(a.date,a.time),db=parseDT(b.date,b.time);return(da?da.getTime():0)-(db?db.getTime():0)};
function isMatchToday(m){return calDate(m)===calToday()}

/* Build sorted events list from match data */
function getEvents(m){
  const evs=[];
  /* openfootball 2026: goals1/goals2 are team-separated arrays */
  ;(m.goals1||[]).forEach(g=>evs.push({
    min:parseInt(g.minute)||0,off:g.minuteOffset||0,type:'goal',
    name:g.name||'?',team:m.team1,og:!!g.owngoal
  }));
  ;(m.goals2||[]).forEach(g=>evs.push({
    min:parseInt(g.minute)||0,off:g.minuteOffset||0,type:'goal',
    name:g.name||'?',team:m.team2,og:!!g.owngoal
  }));
  /* legacy flat goals array (future-proofing) */
  ;(m.goals||[]).forEach(g=>evs.push({
    min:parseInt(g.minute||g.min)||0,off:0,type:'goal',
    name:g.name||g.player||'?',team:g.team||null,
    og:!!(g.name||'').toLowerCase().includes('o.g.')||!!g.owngoal
  }));
  ;(m.cards||m.bookings||[]).forEach(c=>{
    const r=(c.result||c.type||'').toLowerCase();
    evs.push({min:parseInt(c.minute||c.min)||0,off:c.minuteOffset||0,type:r.includes('red')?'red':'yellow',
      name:c.name||c.player||'?',team:c.team||null})
  });
  ;(m.subs||m.substitutions||[]).forEach(s=>evs.push({
    min:parseInt(s.minute||s.min)||0,off:s.minuteOffset||0,type:'sub',
    name:s.name||s.playerOut||'?',nameIn:s.nameIn||s.playerIn||'',team:s.team||null
  }));
  return evs.sort((a,b)=>a.min-b.min);
}

function evIcon(type){return{goal:'⚽',yellow:'🟨',red:'🟥',sub:'🔄'}[type]||'•'}
function evNameLink(name,team,t1,t2){
  if(!name||name==='?')return name;
  for(const tn of [...new Set([team,t1,t2].filter(Boolean))]){
    const ep=findESPNPlayer(tn,name);
    if(ep)return`<span class="ev-plink" onclick="openPlayerModal('${ep.id}','${tn.replace(/'/g,"\\'")}');event.stopPropagation()">${name}</span>`;
  }
  return name;
}
function shortPlayerName(n){
  if(!n)return'';
  const p=n.trim().split(' ');
  if(p.length<=1)return n;
  return p[0][0]+'. '+p.slice(1).join(' ');
}
function subLink(name,shortDisplay,team,t1,t2){
  if(!name||name==='?')return shortDisplay;
  for(const tn of[...new Set([team,t1,t2].filter(Boolean))]){
    const ep=findESPNPlayer(tn,name);
    if(ep)return`<span class="ev-plink" onclick="openPlayerModal('${ep.id}','${tn.replace(/'/g,"\\'")}');event.stopPropagation()">${shortDisplay}</span>`;
  }
  return shortDisplay;
}
function evLabel(ev,t1,t2){
  if(ev.type==='sub'){
    const sin=shortPlayerName(ev.nameIn),sout=shortPlayerName(ev.name);
    return`<span class="ev-in">${subLink(ev.nameIn,sin,ev.team,t1,t2)} ↑</span> <span class="ev-out">${subLink(ev.name,sout,ev.team,t1,t2)} ↓</span>`;
  }
  if(ev.og)return`${evNameLink(ev.name,ev.team,t1,t2)} (e.m.)`;

}

function buildNorwayHTML(){
  const nm=allMatches.filter(m=>m.team1==='Norway'||m.team2==='Norway');
  if(!nm.length)return'<span class="c-muted">Ingen Norges-kamper funnet</span>';
  return nm.map(m=>{
    let extra='';
    if(!m.score?.ft&&!isLive(m)){
      const dt=parseDT(m.date,m.time);
      if(dt){
        const diff=dt-new Date();
        if(diff>0){
          const days=Math.floor(diff/86400000),hrs=Math.floor((diff%86400000)/3600000),mins=Math.floor((diff%3600000)/60000);
          const cdStr=days>0?`${days}d ${hrs}t ${mins}m`:hrs>0?`${hrs}t ${mins}m`:`${mins}m`;
          extra=`<div style="grid-column:1/-1;font-size:14px;color:rgba(244,236,200,.48);text-align:center;padding:.18rem 0 .08rem;border-top:1px solid rgba(232,190,74,.1)">⏱ om ${cdStr}</div>`;
        }
      }
    }
    return matchCardHtml(m,extra);
  }).join('');
}

/* ══ RENDER: FORSIDE ══ */
function getCurrentKoRound(){
  for(const rk of ROUND_ORDER){
    const rm=allMatches.filter(m=>m.round===rk);
    if(rm.length&&rm.some(m=>!m.score?.ft))return rk;
  }
  // All rounds done — return Final so we show the result
  const fin=allMatches.filter(m=>m.round==='Final');
  return fin.length?'Final':null;
}
function isKoMode(){
  const today=todayStr();
  return allMatches.filter(m=>m.round==='Round of 32').some(m=>m.score?.ft||calDate(m)<=today);
}

function renderForside(){
  const el=document.getElementById('vForside');
  const liveHtml=buildLiveHTML();
  const liveIds=new Set(liveMatches.map(m=>m._espnId));
  const notLive=allMatches.filter(m=>!liveIds.has(m._espnId));

  if(isKoMode()){
    /* ── KO MODE: show current round grouped by date ── */
    const curRound=getCurrentKoRound();
    if(curRound){
      const roundMs=notLive.filter(m=>m.round===curRound).sort(byTime);
      const byDate=new Map();
      roundMs.forEach(m=>{
        const cd=calDate(m);
        const k=cd?cap(new Date(cd+'T12:00:00Z').toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long',timeZone:'Europe/Oslo'})):(m.date||'?');
        if(!byDate.has(k))byDate.set(k,[]);byDate.get(k).push(m);
      });
      let datesHtml='';
      byDate.forEach((items,lbl)=>{
        datesHtml+=`<div class="date-sec"><div class="group-header">${lbl}</div>`;
        items.forEach(m=>datesHtml+=matchCardHtml(m));
        datesHtml+='</div>';
      });
      if(!datesHtml)datesHtml=`<p style="padding:.5rem;color:rgba(244,236,200,.4);font-size:16px">Ingen kamper</p>`;
      const roundLbl=ROUND_NO[curRound]||curRound;
      const koHtml=`<div style="margin-bottom:1rem"><div class="group-header">${roundLbl}</div>${datesHtml}</div>`;
      el.innerHTML=liveHtml+koHtml;
    }
    return;
  }

  /* ── GROUP STAGE MODE: today / yesterday ── */
  const todayD=todayStr();
  const yd=new Date(todayD+'T12:00:00');yd.setDate(yd.getDate()-1);
  const yesterdayD=yd.toISOString().slice(0,10);
  const todayMs=notLive.filter(m=>calDate(m)===todayD).sort(byTime);
  const yesterdayMs=notLive.filter(m=>calDate(m)===yesterdayD&&m.score?.ft).sort(byTime);

  const nextHtml=`<div class="pixel-panel" style="margin-bottom:1rem">
    <div class="group-header">I dag</div>
    <div style="padding:.3rem .4rem .05rem">${todayMs.length?todayMs.map(m=>matchCardHtml(m)).join(''):'<p style="padding:.5rem;color:rgba(244,236,200,.4);font-size:16px">Ingen kamper i dag</p>'}</div>
  </div>`;
  const lastHtml=yesterdayMs.length?`<div class="pixel-panel" style="margin-bottom:1rem">
    <div class="group-header">I går</div>
    <div style="padding:.3rem .4rem .05rem">${yesterdayMs.map(m=>matchCardHtml(m)).join('')}</div>
  </div>`:'';
  const norgeHtml=`<div class="pixel-panel" style="margin-bottom:1rem">
    <div class="group-header" style="display:flex;align-items:center;gap:.5rem">
      <img src="flags/no.png" alt="" class="flag-img-sm"> HEIA NORGE! — GRUPPE I <img src="flags/no.png" alt="" class="flag-img-sm">
    </div>
    <div style="padding:.3rem .4rem .05rem">${buildNorwayHTML()}</div>
  </div>`;
  el.innerHTML=liveHtml+nextHtml+lastHtml+norgeHtml+`<div style="margin-top:1.25rem">${buildGrupperHTML()}</div>`;
}

/* ══ RENDER: KAMPPROGRAM ══ */
function renderKampprogram(){
  const sortedAll=[...allMatches].sort(byTime);
  const matches=applyFilters(sortedAll);
  if(currentStatus==='ferdige')matches.reverse();
  const el=document.getElementById('vKampprogram');
  if(!matches.length){
    el.innerHTML=`<p style="color:rgba(244,236,200,.4);font-size:17px;padding:2rem 0;text-align:center">${currentStatus==='idag'?'Ingen VM-kamper i dag. Prøv «Alle».':'Ingen kamper.'}</p>`;return;
  }
  const byDate=new Map();
  matches.forEach(m=>{const cd=calDate(m);const k=cd?cap(new Date(cd+'T12:00:00Z').toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long',timeZone:'Europe/Oslo'})):(m.date||'?');if(!byDate.has(k))byDate.set(k,[]);byDate.get(k).push(m)});
  let html='';
  byDate.forEach((items,lbl)=>{html+=`<div class="date-sec"><div class="group-header">${lbl}</div>`;items.forEach(m=>html+=matchCardHtml(m));html+='</div>';});
  el.innerHTML=html;
}

/* ══ RENDER: KALENDER ══ */
function renderKalender(){
  const cfg=ZCFG[currentZoom]||ZCFG.uke;
  const{cols,minH,max,showName,offset,hdr}=cfg;
  const today=todayStr();
  const dmap=new Map();
  allMatches.forEach(m=>{const k=calDate(m);if(!k)return;if(!dmap.has(k))dmap.set(k,[]);dmap.get(k).push(m)});
  let html='';
  [[2026,5,'Juni 2026'],[2026,6,'Juli 2026']].forEach(([yr,mo,lbl])=>{
    const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
    html+=`<div><div class="group-header cal-month-hdr">${lbl}</div><div class="cal-grid" style="grid-template-columns:repeat(${cols},1fr)">`;
    if(hdr)['Ma','Ti','On','To','Fr','Lø','Sø'].forEach(d=>{html+=`<div class="cal-head">${d}</div>`});
    if(offset){let sd=first.getDay();sd=sd===0?6:sd-1;for(let i=0;i<sd;i++)html+=`<div class="cal-day empty" style="min-height:${minH}px"></div>`}
    for(let d=1;d<=last.getDate();d++){
      const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dm=(dmap.get(ds)||[]).slice().sort(byTime);
      const isTod=ds===today,di=new Date(yr,mo,d).getDay();
      const numLbl=hdr?`${d}${isTod?' ◀':''}`
        :cols===4?`${WEEKDAYS_NO[di]} ${d}.${isTod?' ◀':''}`
        :`${WEEKDAYS_3[di]} ${d}.${isTod?' ◀':''}`;
      const koRound=dm.find(m=>m.round)?.round;
      const roundBadge=koRound?`<span style="font-family:'Press Start 2P',monospace;font-size:6px;color:#f6d45a;background:rgba(246,212,90,.12);border:1px solid rgba(246,212,90,.3);padding:1px 3px;margin-right:4px;vertical-align:middle">${ROUND_CAL[koRound]||koRound}</span>`:'';
      html+=`<div class="cal-day${isTod?' today':''}${dm.length?'':' empty'}" style="min-height:${minH}px">`;
      html+=`<div class="cal-num${isTod?' tday':''}">${roundBadge}${numLbl}</div>`;
      dm.slice(0,max).forEach(m=>{
        const idx=allMatches.indexOf(m),sc=m.score?.ft,dt=parseDT(m.date,m.time);
        const isKO=!m.group;
        const r1=isKO&&isPH(m.team1)?(projectedKoTeam(m.team1)||m.team1):m.team1;
        const r2=isKO&&isPH(m.team2)?(projectedKoTeam(m.team2)||m.team2):m.team2;
        const isNo=r1==='Norway'||r2==='Norway';
        const ctr=sc?`<span class="csc">${sc[0]}-${sc[1]}</span>`:`<span class="ctm">${dt?fmtTime(dt):'?'}</span>`;
        html+=`<div class="cal-mrow${isNo?' m-nor':''}${isKO?' m-ko':''}${sc?' m-fin':''}" data-midx="${idx}">
          <div class="cal-side">${calFlag(r1)}${showName?`<span class="ctn">${tn(r1)}</span>`:''}</div>
          <div class="cal-ctr">${ctr}</div>
          <div class="cal-side right">${calFlag(r2)}${showName?`<span class="ctn">${tn(r2)}</span>`:''}</div>
        </div>`;
      });
      if(dm.length>max)html+=`<div class="cmore">+${dm.length-max} til</div>`;
      html+='</div>';
    }
    if(offset){let ed=last.getDay();ed=ed===0?6:ed-1;const ep=ed===6?0:6-ed;for(let i=0;i<ep;i++)html+=`<div class="cal-day empty" style="min-height:${minH}px"></div>`}
    html+='</div></div>';
  });
  document.getElementById('vKalender').innerHTML=html;
}

/* ══ RENDER: GRUPPER ══ */
function calcStandings(gk){
  const gm=allMatches.filter(m=>m.group===gk);const teams={};
  gm.forEach(m=>{[m.team1,m.team2].forEach(t=>{if(t&&!teams[t])teams[t]={n:t,gp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}})});
  gm.forEach(m=>{if(!m.score?.ft)return;const[g1,g2]=m.score.ft;
    if(!teams[m.team1]||!teams[m.team2])return;
    teams[m.team1].gp++;teams[m.team2].gp++;teams[m.team1].gf+=g1;teams[m.team1].ga+=g2;teams[m.team2].gf+=g2;teams[m.team2].ga+=g1;
    if(g1>g2){teams[m.team1].w++;teams[m.team1].pts+=3;teams[m.team2].l++}
    else if(g1<g2){teams[m.team2].w++;teams[m.team2].pts+=3;teams[m.team1].l++}
    else{teams[m.team1].d++;teams[m.team1].pts++;teams[m.team2].d++;teams[m.team2].pts++}
  });
  return Object.values(teams).sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const da=a.gf-a.ga,db=b.gf-b.ga;if(db!==da)return db-da;
    if(b.gf!==a.gf)return b.gf-a.gf;return a.n.localeCompare(b.n);
  });
}
function buildBestThirdHTML(){
  const thirds=[];
  ['A','B','C','D','E','F','G','H','I','J','K','L'].forEach(g=>{
    const st=calcStandings(`Group ${g}`);
    if(st.length>=3)thirds.push({...st[2],group:g});
  });
  const active=thirds.filter(t=>t.gp>0);
  if(!active.length)return'';
  active.sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const da=a.gf-a.ga,db=b.gf-b.ga;if(db!==da)return db-da;
    if(b.gf!==a.gf)return b.gf-a.gf;return a.n.localeCompare(b.n);
  });
  let html=`<div class="pixel-panel" style="margin-bottom:1.1rem">
    <div class="group-header">Beste treere <span style="font-family:'VT323',monospace;font-size:16px;color:rgba(244,236,200,.45);font-weight:normal">(topp 8 går videre)</span></div>
    <table class="st-tbl"><thead><tr>
      <th>#</th><th style="text-align:left;padding-left:4px">Lag</th>
      <th>S</th><th>V</th><th>U</th><th>T</th><th>Mål</th><th>D</th><th>P</th>
    </tr></thead><tbody>`;
  active.forEach((t,i)=>{
    const gd=t.gf-t.ga;
    html+=`<tr class="${t.n==='Norway'?'row-no':''} ${i===8?'qualify-line':''}">
      <td class="td-pos ${i<8?'q':''}">${i+1}</td>
      <td><div class="td-lag" data-team="${t.n}">${flagEl(t.n,'xs')}<span>${tn(t.n)}</span></div></td>
      <td>${t.gp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td>${t.gf}-${t.ga}</td><td class="td-gd">${gd>0?'+'+gd:gd}</td><td class="td-pts">${t.pts}</td>
    </tr>`;
  });
  return html+'</tbody></table></div>';
}
function buildGrupperHTML(){
  let html='<div class="grupper-grid">';
  ['A','B','C','D','E','F','G','H','I','J','K','L'].forEach(g=>{
    const st=calcStandings(`Group ${g}`);
    html+=`<div class="pixel-panel"><div class="group-header">Gruppe ${g}</div>
      <table class="st-tbl"><thead><tr><th>#</th><th style="text-align:left;padding-left:4px">Lag</th><th>SP</th><th>V</th><th>U</th><th>T</th><th>M</th><th>MD</th><th>P</th></tr></thead><tbody>`;
    st.forEach((t,i)=>{const gd=t.gf-t.ga;
      html+=`<tr class="${t.n==='Norway'?'row-no':''} ${i===2?'qualify-line':''}">
        <td class="td-pos ${i<2?'q':''}">${i+1}</td>
        <td><div class="td-lag" data-team="${t.n}">${flagEl(t.n,'xs')}<span>${tn(t.n)}</span></div></td>
        <td>${t.gp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}:${t.ga}</td><td class="td-gd">${gd>0?'+'+gd:gd}</td><td class="td-pts">${t.pts}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  });
  return html+'</div>';
}
function renderGrupper(){
  document.getElementById('vGrupper').innerHTML=buildBestThirdHTML()+buildGrupperHTML();
}

/* ── Mobile bracket helpers ── */
function mbrCard(m,idx){
  if(!m)return`<div id="mbr${idx}" class="mbr-ph"></div>`;
  const t1=m.team1||'?',t2=m.team2||'?',sc=m.score?.ft;
  const w1=sc&&sc[0]>sc[1],w2=sc&&sc[1]>sc[0];
  function row(t,sv,win){
    const ph=isPH(t);
    const proj=ph?projectedKoTeam(t):null;
    const certain=!ph||!proj||isProjectionCertain(t);
    const disp=proj||t;
    const fl=FLAG_FILE[disp]
      ?`<img src="flags/${FLAG_FILE[disp]}.png" style="width:16px;height:11px;flex-shrink:0;image-rendering:pixelated${proj&&!certain?';opacity:.55':''}" alt="">`
      :`<span style="width:16px;height:11px;background:rgba(255,255,255,.12);display:inline-block;flex-shrink:0"></span>`;
    const score=sc!==undefined&&!ph?`<span class="mbr-sc${win?' mbr-sw':''}">${sv}</span>`:'';
    return`<div class="mbr-row${win?' mbr-win':''}">${fl}${score}</div>`;
  }
  const isNo=t1==='Norway'||t2==='Norway'||projectedKoTeam(t1)==='Norway'||projectedKoTeam(t2)==='Norway';
  const NOM=['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  const dateLbl=m.date?(()=>{const[,mo,dy]=m.date.split('-');return`${parseInt(dy)}.${NOM[parseInt(mo)-1]}`})():'';
  return`<div class="mbr-card${isNo?' mbr-nor':''}" id="mbr${idx}" data-midx="${idx}">
    ${row(t1,sc?sc[0]:'-',w1)}${row(t2,sc?sc[1]:'-',w2)}${dateLbl?`<div class="mbr-date">${dateLbl}</div>`:''}
  </div>`;
}
function mbrCol(arr,BH,lbl=''){
  const hdr=lbl?`<div style="position:absolute;top:0;left:0;right:0;font-family:'Press Start 2P',monospace;font-size:6px;color:#f6d45a;background:rgba(246,212,90,.12);border-bottom:1px solid rgba(246,212,90,.3);text-align:center;padding:2px 0;z-index:3">${lbl}</div>`:'';
  return`<div class="mob-col" style="height:${BH}px;position:relative">${hdr}${arr.map(m=>mbrCard(m,midxOf(m))).join('')}</div>`;
}
function buildMobileBracket(gc,r32,r16,qf,sf,tp,fin){
  const BH=560;
  const lft=`<div class="mob-half" style="height:${BH}px">
    ${mbrCol(r32.slice(0,8),BH,'R32')}${mbrCol(r16.slice(0,4),BH,'R16')}
    ${mbrCol(qf.slice(0,2),BH,'QF')}${mbrCol(sf.slice(0,1),BH,'SF')}</div>`;
  const ctr=`<div class="mob-center" style="height:${BH}px">
    <img src="trophy.png" style="width:44px;height:44px;image-rendering:pixelated;object-fit:contain" alt="trophy">${mbrCard(fin,fin?midxOf(fin):gc+31)}
    <div class="mob-fin-lbl">FINALE</div></div>`;
  const rgt=`<div class="mob-half" style="height:${BH}px">
    ${mbrCol(sf.slice(1,2),BH,'SF')}${mbrCol(qf.slice(2,4),BH,'QF')}
    ${mbrCol(r16.slice(4,8),BH,'R16')}${mbrCol(r32.slice(8,16),BH,'R32')}</div>`;
  const brz=tp?`<div class="mob-bronze-hdr">🥉 BRONSEFINALE</div><div style="max-width:260px;margin:0 auto">${matchCardHtml(tp)}</div>`:'';
  return`<div class="mob-bracket-inner" id="mbInner" style="height:${BH}px">${lft}${ctr}${rgt}</div>${brz}`;
}
function drawMobileSVG(r32,r16,qf,sf,fin){
  const inner=document.getElementById('mbInner');if(!inner)return;
  const old=inner.querySelector('svg.mob-svg');if(old)old.remove();
  const sv=document.createElementNS('http://www.w3.org/2000/svg','svg');
  sv.className='mob-svg';
  sv.style.cssText='position:absolute;top:0;left:0;pointer-events:none;z-index:5;overflow:visible';
  sv.setAttribute('width',inner.scrollWidth);sv.setAttribute('height',inner.scrollHeight);
  inner.style.position='relative';
  const ir=inner.getBoundingClientRect();
  function mkPath(d,col,w){
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',d);p.setAttribute('stroke',col||'#e8be4a');
    p.setAttribute('stroke-width',w||'1.5');p.setAttribute('fill','none');p.setAttribute('stroke-opacity','.65');
    sv.appendChild(p);
  }
  function pair(id1,id2,pid,goRight){
    if(id1<0||id2<0||pid<0)return;
    const e1=document.getElementById(`mbr${id1}`),e2=document.getElementById(`mbr${id2}`),ep=document.getElementById(`mbr${pid}`);
    if(!e1||!e2||!ep)return;
    const r1=e1.getBoundingClientRect(),r2=e2.getBoundingClientRect(),rp=ep.getBoundingClientRect();
    const y1=(r1.top+r1.bottom)/2-ir.top,y2=(r2.top+r2.bottom)/2-ir.top,yp=(rp.top+rp.bottom)/2-ir.top;
    const x1=goRight?r1.right-ir.left:r1.left-ir.left;
    const x2=goRight?r2.right-ir.left:r2.left-ir.left;
    const xp=goRight?rp.left-ir.left:rp.right-ir.left;
    const xm=(x1+xp)/2;
    mkPath(`M${x1} ${y1} H${xm} V${y2} H${x2} M${xm} ${yp} H${xp}`);
  }
  function arm(fid,tid,fRight,tLeft){
    if(fid<0||tid<0)return;
    const ef=document.getElementById(`mbr${fid}`),et=document.getElementById(`mbr${tid}`);
    if(!ef||!et)return;
    const rf=ef.getBoundingClientRect(),rt=et.getBoundingClientRect();
    const yf=(rf.top+rf.bottom)/2-ir.top,yt=(rt.top+rt.bottom)/2-ir.top;
    const xf=fRight?rf.right-ir.left:rf.left-ir.left;
    const xt=tLeft?rt.left-ir.left:rt.right-ir.left;
    const xm=(xf+xt)/2;
    mkPath(Math.abs(yf-yt)<3?`M${xf} ${yf} H${xt}`:`M${xf} ${yf} H${xm} V${yt} H${xt}`,'#f6d45a','1.5');
  }
  const id=m=>m?midxOf(m):-1;
  // Left side (r32[0-7] → r16[0-3] → qf[0-1] → sf[0] → fin)
  for(let i=0;i<4;i++)pair(id(r32[i*2]),id(r32[i*2+1]),id(r16[i]),true);
  pair(id(r16[0]),id(r16[1]),id(qf[0]),true);
  pair(id(r16[2]),id(r16[3]),id(qf[1]),true);
  pair(id(qf[0]),id(qf[1]),id(sf[0]),true);
  if(sf[0]&&fin)arm(id(sf[0]),id(fin),true,true);
  // Right side (r32[8-15] → r16[4-7] → qf[2-3] → sf[1] → fin)
  for(let i=0;i<4;i++)pair(id(r32[8+i*2]),id(r32[9+i*2]),id(r16[4+i]),false);
  pair(id(r16[4]),id(r16[5]),id(qf[2]),false);
  pair(id(r16[6]),id(r16[7]),id(qf[3]),false);
  pair(id(qf[2]),id(qf[3]),id(sf[1]),false);
  if(sf[1]&&fin)arm(id(sf[1]),id(fin),false,false);
  inner.appendChild(sv);
}

function parseTRef(r){
  if(!r)return'TBD';
  const wm=r.match(/^W(\d+)$/);if(wm)return`V.K${wm[1]}`;
  const gm=r.match(/^(\d+)([A-L])$/);if(gm)return`${gm[1]}.Gr${gm[2]}`;
  const tm=r.match(/^3([A-L]{2,})$/);if(tm)return`3.pl(${tm[1]})`;
  const ew=r.match(/^Group ([A-L]) Winner$/i);if(ew)return`1.Gr${ew[1]}`;
  const ep=r.match(/^Group ([A-L]) (\d+)/i);if(ep)return`${ep[2]}.Gr${ep[1]}`;
  const et=r.match(/^Third Place Group ([A-L/]+)/i);if(et)return`3.pl(${et[1]})`;
  const er=r.match(/^Round of (\d+) (\d+) Winner$/i);if(er)return`V.R${er[1]}#${er[2]}`;
  return tn(r);
}
function isPH(r){
  if(!r)return true;
  if(r.match(/^[WL\d]/))return true;
  if(r.match(/^Group [A-L] /i))return true;
  if(r.match(/^Third Place Group /i))return true;
  if(r.match(/^Round of (32|16) \d+ Winner/i))return true;
  if(r.match(/^Quarterfinal \d+ Winner/i))return true;
  if(r.match(/^Semifinal \d+ (Winner|Loser)/i))return true;
  return false;
}
function projectedKoTeam(ref){
  if(!ref||!isPH(ref))return null;
  // Short code: "1A"
  const sc=ref.match(/^(\d+)([A-L])$/);
  if(sc){const rank=parseInt(sc[1]),st=calcStandings(`Group ${sc[2]}`);return st[rank-1]?.gp>0?st[rank-1].n:null;}
  // ESPN text: "Group A Winner"
  const ew=ref.match(/^Group ([A-L]) Winner$/i);
  if(ew){const st=calcStandings(`Group ${ew[1]}`);return st[0]?.gp>0?st[0].n:null;}
  // ESPN text: "Group B 2nd Place" / "Group C 3rd Place"
  const ep=ref.match(/^Group ([A-L]) (\d+)/i);
  if(ep){const rank=parseInt(ep[2]),st=calcStandings(`Group ${ep[1]}`);return st[rank-1]?.gp>0?st[rank-1].n:null;}
  // "Third Place Group A/B/C/D/F" — do NOT guess; FIFA assigns these via a matrix.
  // ESPN confirms the actual team once groups are done; fetchUpcomingKoTeams() handles it.
  const tp=ref.match(/^Third Place Group ([A-L][/A-L]*)/i);
  if(tp)return null;
  // "Round of 32/16 N Winner", "Quarterfinal N Winner", "Semifinal N Winner/Loser"
  const rw=ref.match(/^(Round of 32|Round of 16|Quarterfinal|Semifinal) (\d+) (Winner|Loser)$/i);
  if(rw){
    const[,roundName,nStr,outcome]=rw,n=parseInt(nStr);
    const roundKey={'round of 32':'Round of 32','round of 16':'Round of 16','quarterfinal':'Quarterfinals','semifinal':'Semifinals'}[roundName.toLowerCase()];
    if(!roundKey)return null;
    const pool=allMatches.filter(m=>m.round===roundKey).sort((a,b)=>a._espnId<b._espnId?-1:1);
    const match=pool[n-1];if(!match||!match.score?.ft)return null;
    const[s1,s2]=match.score.ft;
    if(outcome.toLowerCase()==='loser')return s1<s2?match.team1:s1>s2?match.team2:null;
    return s1>s2?match.team1:s1<s2?match.team2:null;
  }
  return null;
}
function isProjectionCertain(ref){
  if(!ref||!isPH(ref))return true;
  const ew=ref.match(/^Group ([A-L]) Winner$/i);
  if(ew){const st=calcStandings(`Group ${ew[1]}`);return st.length>=2&&st.every(t=>t.gp>=3);}
  const ep=ref.match(/^Group ([A-L]) (\d+)/i);
  if(ep){const st=calcStandings(`Group ${ep[1]}`);return st.length>=2&&st.every(t=>t.gp>=3);}
  const sc=ref.match(/^(\d+)([A-L])$/);
  if(sc){const st=calcStandings(`Group ${sc[2]}`);return st.length>=2&&st.every(t=>t.gp>=3);}
  const tp=ref.match(/^Third Place Group ([A-L/]+)/i);
  if(tp)return false; // never certain until ESPN confirms via fetchUpcomingKoTeams
  const rw=ref.match(/^(Round of 32|Round of 16|Quarterfinal|Semifinal) (\d+) (Winner|Loser)$/i);
  if(rw){
    const[,roundName,nStr]=rw,n=parseInt(nStr);
    const roundKey={'round of 32':'Round of 32','round of 16':'Round of 16','quarterfinal':'Quarterfinals','semifinal':'Semifinals'}[roundName.toLowerCase()];
    if(!roundKey)return false;
    const pool=allMatches.filter(m=>m.round===roundKey).sort((a,b)=>a._espnId<b._espnId?-1:1);
    return !!(pool[n-1]?.score?.ft);
  }
  return false;
}
function midxOf(m){return allMatches.findIndex(x=>x._espnId===m._espnId)}
function brCard(m,idx){
  if(!m)return`<div class="br-card" id="bm${idx}" data-midx="${idx}"><div class="br-row"><span class="br-name dim">TBD</span></div><div class="br-row"><span class="br-name dim">TBD</span></div></div>`;
  const t1=m.team1||'?',t2=m.team2||'?',sc=m.score?.ft,dt=parseDT(m.date,m.time);
  function row(t,score,win){
    const ph=isPH(t);
    const proj=ph?projectedKoTeam(t):null;
    const certain=!ph||!proj||isProjectionCertain(t);
    const disp=proj||t;
    const c=FLAG_FILE[disp];
    const fi=c?`<img src="flags/${c}.png" alt="" class="flag-img-xs" loading="lazy"${proj&&!certain?' style="opacity:.55"':''}>`:
      `<span style="display:inline-block;width:20px;height:14px;background:rgba(0,0,0,.2);flex-shrink:0"></span>`;
    const label=proj?tn(proj):ph?parseTRef(t):tn(t);
    const cls=`br-name${disp==='Norway'?' no':''}${(ph&&!proj)?' dim':''}${proj&&!certain?' proj':''}`;
    return`<div class="br-row${win?' winner':''}">${fi}<span class="${cls}">${label}</span>${sc!==undefined?`<span class="br-score${win?' w':''}">${score}</span>`:''}</div>`;
  }

  return`<div class="br-card${isNo?' nc':''}" id="bm${idx}" data-midx="${idx}">
    ${row(t1,sc?sc[0]:'-',w1)}${row(t2,sc?sc[1]:'-',w2)}

}

function drawSVG(r32,r16,qf,sf,fin){

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');

  svg.setAttribute('width',inner.scrollWidth);svg.setAttribute('height',inner.scrollHeight);inner.style.position='relative';
  const id=m=>m?midxOf(m):-1;
  const pairs=[];
  for(let i=0;i<8;i++){if(r32[i*2]&&r32[i*2+1]&&r16[i])pairs.push([id(r32[i*2]),id(r32[i*2+1]),id(r16[i])]);}
  for(let i=0;i<4;i++){if(r16[i*2]&&r16[i*2+1]&&qf[i])pairs.push([id(r16[i*2]),id(r16[i*2+1]),id(qf[i])]);}
  if(qf[0]&&qf[1]&&sf[0])pairs.push([id(qf[0]),id(qf[1]),id(sf[0])]);
  if(qf[2]&&qf[3]&&sf[1])pairs.push([id(qf[2]),id(qf[3]),id(sf[1])]);
  if(sf[0]&&sf[1]&&fin)pairs.push([id(sf[0]),id(sf[1]),id(fin)]);
  const ir=inner.getBoundingClientRect();
  pairs.forEach(([i1,i2,ip])=>{
    const e1=document.getElementById(`bm${i1}`),e2=document.getElementById(`bm${i2}`),ep=document.getElementById(`bm${ip}`);
    if(!e1||!e2||!ep)return;
    const r1=e1.getBoundingClientRect(),r2=e2.getBoundingClientRect(),rp=ep.getBoundingClientRect();
    const x1=r1.right-ir.left,y1=(r1.top+r1.bottom)/2-ir.top,x2=r2.right-ir.left,y2=(r2.top+r2.bottom)/2-ir.top,xp=rp.left-ir.left,mx=(x1+xp)/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${x1} ${y1} H${mx} V${y2} M${mx} ${(y1+y2)/2} H${xp}`);
    path.setAttribute('stroke','#e8be4a');path.setAttribute('stroke-width','1.5');path.setAttribute('fill','none');path.setAttribute('stroke-opacity','.55');
    svg.appendChild(path);
  });
  inner.appendChild(svg);
}

function renderStatistikk(){
  computeGoals();
  // Trigger background loading of summaries (for goals/cards) if not running yet
  if(!_summariesLoading)loadAllCompletedSummaries();
  const el=document.getElementById('vStatistikk');

  /* Build team lookup: player name → team */
  const playerTeam={};
  allMatches.forEach(m=>{
    [...(m.goals1||[])].forEach(g=>{if(g.name&&!g.owngoal)playerTeam[g.name.toUpperCase()]=m.team1});
    [...(m.goals2||[])].forEach(g=>{if(g.name&&!g.owngoal)playerTeam[g.name.toUpperCase()]=m.team2});
  });

  const scorers=Object.entries(playerGoals).sort((a,b)=>b[1]-a[1]);
  if(!scorers.length){
    el.innerHTML=`<div class="pixel-panel" style="margin-top:1rem"><div class="group-header">Toppscorere</div><div style="padding:1rem;font-size:16px;color:rgba(244,236,200,.4)">Ingen mål scoret ennå.</div></div>`;
    return;
  }

  /* Own goals for footnote */
  const ownGoals=[];
  allMatches.forEach(m=>{
    [...(m.goals1||[]),...(m.goals2||[])].forEach(g=>{if(g.owngoal&&g.name)ownGoals.push({name:g.name,match:`${m.team1} – ${m.team2}`})});
  });

  let rows='';
  scorers.forEach(([nameKey,g],i)=>{
    const team=playerTeam[nameKey]||null;
    const ep=team?findESPNPlayer(team,nameKey):null;
    const displayName=ep?ep.name:nameKey.split(' ').map(w=>w.charAt(0)+w.slice(1).toLowerCase()).join(' ');
    const nameHtml=ep
      ?`<span class="ev-plink" onclick="openPlayerModal('${ep.id}','${(team||'').replace(/'/g,"\\'")}');event.stopPropagation()">${displayName}</span>`
      :displayName;
    rows+=`<tr${i===0?' style="background:rgba(246,212,90,.08)"':''}>
      <td class="td-pos ${i<3?'q':''}" style="font-size:16px">${i+1}</td>
      <td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0;width:100%"><div style="display:flex;align-items:center;gap:.4rem">${team?flagEl(team,'sm'):''}<span style="font-size:24px">${nameHtml}</span></div></td>
      <td class="td-pts" style="font-size:16px">${g}</td>
    </tr>`;
  });

  let ownHtml='';
  if(ownGoals.length){
    ownHtml=`<div class="pixel-panel" style="margin-top:1rem"><div class="group-header">Selvmål</div><div style="padding:.4rem .65rem">`
      +ownGoals.map(o=>`<div style="font-size:15px;padding:2px 0;color:rgba(244,236,200,.6)">${o.name} <span style="color:rgba(244,236,200,.35);font-size:13px">(${o.match})</span></div>`).join('')
      +`</div></div>`;
  }

  el.innerHTML=`<div class="pixel-panel" style="margin-top:1rem">
    <div class="group-header">Toppscorere</div>
    <table class="st-tbl" style="width:100%">
      <thead><tr>
        <th>#</th><th style="text-align:left;padding-left:4px">Spiller</th>
        <th>Mål</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>${ownHtml}`;
}

const VIEW_TITLES={kampprogram:'KAMPPROGRAM',kalender:'KALENDER',grupper:'GRUPPER',sluttspill:'SLUTTSPILL',statistikk:'TOPPSCORER'};
function showView(view){
  currentView=view;
  ['vForside','vKampprogram','vKalender','vGrupper','vSluttspill','vStatistikk'].forEach(id=>document.getElementById(id).style.display='none');
  const inK=view==='kampprogram',inC=view==='kalender',inF=view==='forside';
  document.getElementById('statusBar').style.display=inK?'flex':'none';
  document.getElementById('groupBar').style.display=inK?'flex':'none';
  document.getElementById('zoomBar').style.display=inC?'flex':'none';
  document.querySelector('header').style.display=inF?'':'none';
  const sub=document.getElementById('subHeader');
  sub.style.display=inF?'none':'flex';
  if(!inF)document.getElementById('subHeaderTitle').textContent=VIEW_TITLES[view]||view.toUpperCase();
  document.querySelectorAll('.vbtn').forEach(b=>b.className=`vbtn ${b.dataset.view===view?'on-'+view:'off'}`);
  document.querySelectorAll('.mob-tab').forEach(b=>b.classList.toggle('mob-active',b.dataset.view===view));
  document.getElementById('v'+view.charAt(0).toUpperCase()+view.slice(1)).style.display=inC?'flex':'block';
  if(view!=='kalender')window.scrollTo({top:0,behavior:'instant'});
  if(view==='forside')renderForside();
  else if(view==='kampprogram')renderKampprogram();
  else if(view==='kalender'){renderKalender();requestAnimationFrame(()=>{const td=document.querySelector('.cal-day.today');if(td)td.scrollIntoView({behavior:'smooth',block:'center'})});}
  else if(view==='grupper')renderGrupper();
  else if(view==='sluttspill')renderSluttspill();
  else if(view==='statistikk')renderStatistikk();
}

async function getESPNScoreboard(dateStr){
  if(espnScoreboardCache[dateStr])return espnScoreboardCache[dateStr];
  const todayStr=new Date().toISOString().slice(0,10).replace(/-/g,'');
  const isPast=dateStr<todayStr;
  const ttl=isPast?24*3600*1000:2*60*1000;
  const ls=cacheGet('espn_sb_'+dateStr,ttl);
  if(ls){espnScoreboardCache[dateStr]=ls;return ls}
  try{
    const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateStr}`);

    const evs=d.events||[];
    espnScoreboardCache[dateStr]=evs;
    if(evs.length||isPast)cacheSet('espn_sb_'+dateStr,evs);

function parseEvMin(str){
  const s=str||'0';
  const mm=s.match(/(\d+)\+(\d+)/);
  return mm?{min:parseInt(mm[1]),off:parseInt(mm[2])}:{min:parseInt(s.replace(/[^0-9]/g,''))||0,off:0};
}

function applyESPNSummary(summary,m){
  if(!m){statLookup._cache=null;return}
  const t1id=String(typeof ESPN_TEAMS!=='undefined'?ESPN_TEAMS[m.team1]?.id||'':'');
  const t2id=String(typeof ESPN_TEAMS!=='undefined'?ESPN_TEAMS[m.team2]?.id||'':'');

  // 2. Goals + cards + subs — all from keyEvents (scoringPlays is always empty for this competition)
  //    Goals are flagged with ke.scoringPlay===true (covers goal, goal---header, goal---penalty, etc.)
  if((summary.keyEvents||[]).length){
    const g1=[],g2=[],cards=[],subs=[],ht=[0,0];
    for(const ke of summary.keyEvents){
      const tid=String(ke.team?.id||'');
      const isT1=t1id&&tid===t1id,isT2=t2id&&tid===t2id;
      if(!isT1&&!isT2)continue;
      const team=isT1?m.team1:m.team2;
      const {min,off}=parseEvMin(ke.clock?.displayValue);
      const pt=(ke.type?.type||'').toLowerCase();
      const ptTxt=(ke.type?.text||'').toLowerCase();
      if(ke.scoringPlay===true){
        const scorer=ke.participants?.[0]?.athlete?.displayName;
        const assist=ke.participants?.[1]?.athlete?.displayName||null;
        const isOG=ptTxt.includes('own')||(ke.text||'').toLowerCase().includes('own goal');
        const period=ke.period?.number||2;
        const goal={name:scorer||'?',minute:min,minuteOffset:off,owngoal:isOG,assist};
        if(isT1)g1.push(goal); else g2.push(goal);
        if(period===1){
          if(isT1&&!isOG)ht[0]++; else if(isT2&&!isOG)ht[1]++;
          else if(isT1&&isOG)ht[1]++; else if(isT2&&isOG)ht[0]++;
        }
      } else if(pt==='yellow-card'||pt==='yellowcard'){
        const name=ke.participants?.[0]?.athlete?.displayName;
        if(name)cards.push({name,minute:min,minuteOffset:off,type:'yellow',team});
      } else if(pt==='red-card'||pt==='redcard'||ptTxt.includes('red card')){
        const name=ke.participants?.[0]?.athlete?.displayName;
        if(name)cards.push({name,minute:min,minuteOffset:off,type:'red',team});
      } else if(pt==='substitution'){
        const nameIn=ke.participants?.[0]?.athlete?.displayName;
        const nameOut=ke.participants?.[1]?.athlete?.displayName;
        if(nameIn||nameOut)subs.push({nameIn:nameIn||'',name:nameOut||'?',minute:min,minuteOffset:off,team});
      }
    }
    if(g1.length||g2.length){m.goals1=g1;m.goals2=g2;}
    if(cards.length)m.cards=cards;
    if(subs.length)m.subs=subs;
    if(!m.score)m.score={};
    if(ht[0]||ht[1])m.score.ht=ht;
  }
  statLookup._cache=null;
}

async function fetchESPNSummary(eventId){
  if(espnSummaryCache[eventId])return espnSummaryCache[eventId];
  const lsKey='espn_sum2_'+eventId;

  if(cached){espnSummaryCache[eventId]=cached;return cached}

/* Fuzzy stat lookup: normalize accents, then match by full name or surname */
function normStr(s){return s.replace(/[øØ]/g,'O').replace(/[åÅ]/g,'A').replace(/[æÆ]/g,'AE').replace(/[öÖ]/g,'O').replace(/[üÜ]/g,'U').replace(/[ñÑ]/g,'N').normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/-/g,'').toUpperCase().trim()}
function statLookup(dict,fullName){
  if(dict[fullName])return dict[fullName];
  const norm=normStr(fullName);
  if(!statLookup._cache||statLookup._src!==dict){
    statLookup._src=dict;
    statLookup._cache={};
    for(const[k,v] of Object.entries(dict)) statLookup._cache[normStr(k)]=v;
  }
  if(statLookup._cache[norm])return statLookup._cache[norm];
  const parts=norm.split(' ');
  if(parts.length>=2){
    const rev=parts.slice(1).join(' ')+' '+parts[0];
    if(statLookup._cache[rev])return statLookup._cache[rev];
  }
  return 0;
}
function buildTeamGoals(teamName){
  const g={};
  allMatches.forEach(m=>{
    const myGoals=m.team1===teamName?m.goals1:m.team2===teamName?m.goals2:null;
    if(!myGoals)return;
    myGoals.forEach(({name,owngoal})=>{
      if(!name||owngoal)return;
      g[name.toUpperCase()]=(g[name.toUpperCase()]||0)+1;
    });
  });
  return g;
}
function buildTeamAssists(teamName){
  const a={};
  allMatches.forEach(m=>{
    const myGoals=m.team1===teamName?m.goals1:m.team2===teamName?m.goals2:null;
    if(!myGoals)return;
    myGoals.forEach(({assist,owngoal})=>{
      if(!assist||owngoal)return;
      a[assist.toUpperCase()]=(a[assist.toUpperCase()]||0)+1;
    });
  });
  return a;
}

const ESPN_POS_NORM={GK:'GK',G:'GK',CB:'DEF',LB:'DEF',RB:'DEF',LWB:'DEF',RWB:'DEF',SW:'DEF',D:'DEF',CM:'MID',DM:'MID',AM:'MID',LM:'MID',RM:'MID',CDM:'MID',CAM:'MID',M:'MID',ST:'FWD',LW:'FWD',RW:'FWD',CF:'FWD',SS:'FWD',F:'FWD'};
function normalizeESPNPos(p){return ESPN_POS_NORM[p]||p}

function buildDisplaySquad(teamName){
  const espnList=typeof ESPN_PLAYERS!=='undefined'?ESPN_PLAYERS[teamName]:null;
  if(!espnList)return null;
  const swosKey=swosTeam(teamName);
  const swosSq=wc2026Players?wc2026Players[swosKey]:null;
  const swosMap={};
  if(swosSq){
    for(const sp of swosSq){
      const nk=normStr(sp.n);
      swosMap[nk]=sp;
      const pts=nk.split(' ');
      if(pts.length>=2)swosMap[pts.slice(1).join(' ')+' '+pts[0]]=sp;
    }
  }
  const posOrder={GK:0,DEF:1,MID:2,FWD:3};
  return espnList.map(ep=>{
    const nk=normStr(ep.name);
    const sp=swosMap[nk];
    const pos=normalizeESPNPos(ep.pos);
    return{id:ep.id,name:ep.name,pos,jersey:ep.jersey,skin:sp?.skin||'Light',hair:sp?.hair||'Black'};

    ?`<div class="swos-section"><div class="ev-hdr">VM 2026 – TROPP</div><div class="swos-squad-panel"><table class="squad-tbl"><thead><tr><th></th><th>#</th><th>Pos</th><th class="sq-th-n">Navn</th><th>Mål</th><th>A</th></tr></thead><tbody id="espn-squad-list">${sq.map((p,i)=>swosSquadRow(p,i,name,tGoals,playerAssists)).join('')}</tbody></table></div></div>`:'';

  document.getElementById('teamModalContent').innerHTML=`
    <div class="team-hdr-row">
      ${flagEl(name,'lg')}
      <div>
        <div class="modal-tname${name==='Norway'?' no':''}">${noName}</div>
      </div>
    </div>
    ${groupTableHtml}
    ${matchesHtml}
    ${squadHtml}`;
  document.getElementById('teamModal').style.zIndex='510';
  document.getElementById('matchModal').style.zIndex='504';
  document.getElementById('teamModal').style.display='flex';
  document.body.style.overflow='hidden';

  if(sq){
    const _name=name,_sq=sq;
    loadTeamAssists(_name).then(()=>{
      const list=document.getElementById('espn-squad-list');
      if(list)list.innerHTML=_sq.map((p,i)=>swosSquadRow(p,i,_name,buildTeamGoals(_name),playerAssists)).join('');
    });
  }
}
function closeTeamModal(){
  document.getElementById('teamModal').style.display='none';
  document.body.style.overflow='';
}

/* ══ LOAD ══ */
function applyScoreboardToMatches(events){
  for(const ev of events){
    const m=allMatches.find(x=>x._espnId===ev.id);
    if(!m)continue;
    const comp=ev.competitions?.[0];if(!comp)continue;
    const home=comp.competitors?.find(c=>c.homeAway==='home');
    const away=comp.competitors?.find(c=>c.homeAway==='away');
    if(!home||!away)continue;
    const state=comp.status?.type?.state;
    const isPost=state==='post',isIn=state==='in';
    const sc1=isPost||isIn?parseInt(home.score||'0'):null;
    const sc2=isPost||isIn?parseInt(away.score||'0'):null;
    if(isPost){
      m.status='FT';
      if(sc1!==null)m.score={ft:[sc1,sc2]};
    } else if(isIn){
      m.status=comp.status?.displayClock||'live';
      m.live_minute=comp.status?.displayClock?.replace("'",'');
      if(sc1!==null)m.score={ft:[sc1,sc2]};
    }
    // Update team names for knockout matches (TBD → actual teams)
    if(m.round){
      const t1=espnTeamCanonical(home.team.displayName);
      const t2=espnTeamCanonical(away.team.displayName);
      if(t1&&t1!==m.team1&&!t1.includes('TBD'))m.team1=t1;
      if(t2&&t2!==m.team2&&!t2.includes('TBD'))m.team2=t2;
    }
  }
}

async function fetchAllScores(){
  const today=new Date().toISOString().slice(0,10);
  const pastDates=new Set();
  for(const m of allMatches){
    if(m.date&&m.date<=today)pastDates.add(m.date.replace(/-/g,''));
  }
  const dates=[...pastDates].sort();
  const BATCH=8;
  for(let i=0;i<dates.length;i+=BATCH){
    const batch=dates.slice(i,i+BATCH);
    const results=await Promise.allSettled(batch.map(d=>getESPNScoreboard(d)));
    for(const r of results){
      if(r.status==='fulfilled')applyScoreboardToMatches(r.value);
    }
  }
  computeGoals();computeAssists();computeCards();
  if(currentView==='forside')renderForside();
  else if(currentView==='kampprogram')renderKampprogram();
  else if(currentView==='grupper')renderGrupper();
  else if(currentView==='sluttspill')renderSluttspill();
  // Background: load goals/cards/subs for all completed matches
  loadAllCompletedSummaries();
}

let _lastKoTeamFetch=0;
async function fetchUpcomingKoTeams(){
  const now=Date.now();
  if(now-_lastKoTeamFetch<5*60*1000)return; // throttle: at most every 5 min
  _lastKoTeamFetch=now;
  const today=new Date().toISOString().slice(0,10);
  const futureDates=new Set();
  for(const m of allMatches){
    if(!m.group&&m.date&&m.date>today)futureDates.add(m.date.replace(/-/g,''));
  }
  let changed=false;
  for(const ds of [...futureDates].sort()){
    try{
      delete espnScoreboardCache[ds]; // bypass in-memory cache to get fresh confirmations
      const snapBefore=allMatches.filter(m=>m.round).map(m=>m.team1+m.team2).join();
      const evs=await getESPNScoreboard(ds);
      applyScoreboardToMatches(evs);
      const snapAfter=allMatches.filter(m=>m.round).map(m=>m.team1+m.team2).join();
      if(snapBefore!==snapAfter)changed=true;
    }catch{}
  }
  if(changed){
    if(currentView==='forside')renderForside();
    else if(currentView==='kampprogram')renderKampprogram();
    else if(currentView==='sluttspill')renderSluttspill();
    else if(currentView==='kalender')renderKalender();
  }
}

let _summariesLoading=false;
async function loadAllCompletedSummaries(){
  if(_summariesLoading)return;
  _summariesLoading=true;
  try{
    const completed=allMatches.filter(m=>m.score?.ft&&!isLive(m)&&m._espnId);
    const BATCH=5;
    for(let i=0;i<completed.length;i+=BATCH){
      await Promise.allSettled(completed.slice(i,i+BATCH).map(async m=>{
        const data=await fetchESPNSummary(m._espnId);
        if(data)applyESPNSummary(data,m);
      }));
    }
    computeGoals();computeAssists();computeCards();
    if(currentView==='statistikk')renderStatistikk();
    else if(currentView==='forside')renderForside();
  }finally{_summariesLoading=false;}
}

async function loadData(){
  try{
    // Fast path: use static ESPN_MATCHES from espn-data.js
    if(typeof ESPN_MATCHES!=='undefined'&&ESPN_MATCHES.length){
      await loadESPNGroups(); // populates espnTeamGroups from static data (instant)
      allMatches=ESPN_MATCHES.map(sm=>({
        _espnId:sm.id,date:sm.date,time:sm.time,
        team1:sm.team1,team2:sm.team2,
        group:sm.group||null,round:sm.round||null,
        ground:sm.venue||null,
        status:'',live_minute:null,score:null,
        goals1:[],goals2:[],cards:[],subs:[]
      }));
      allMatches.sort((a,b)=>(a.date+(a.time||''))<(b.date+(b.time||''))?-1:1);
      // Pre-load cached scoreboards synchronously so scores are visible on first render
      const _todayDs=new Date().toISOString().slice(0,10).replace(/-/g,'');
      const _seenDates=new Set();
      for(const m of allMatches){
        if(!m.date)continue;
        const ds=m.date.replace(/-/g,'');
        if(ds>_todayDs||_seenDates.has(ds))continue;
        _seenDates.add(ds);
        const ttl=ds<_todayDs?24*3600*1000:2*60*1000;
        const cached=cacheGet('espn_sb_'+ds,ttl);
        if(cached){espnScoreboardCache[ds]=cached;applyScoreboardToMatches(cached);}
      }
      computeGoals();computeAssists();computeCards();
      document.getElementById('loading').style.display='none';
      showView('forside');
      fetchAllScores(); // background: fetch fresh data for today + uncached dates
      fetchUpcomingKoTeams(); // background: get ESPN-confirmed team names for upcoming KO matches
      fetchNRKHighlights(); // background: check for new NRK episodes
      startLivePolling();
      return;
    }
    // Fallback: dynamic fetch (all 43 scoreboard days)
    const[evs]=await Promise.all([loadAllESPNMatches(),loadESPNGroups()]);
    allMatches=evs.map(mapESPNEvent).filter(Boolean);
    allMatches.sort((a,b)=>(a.date+(a.time||''))<(b.date+(b.time||''))?-1:1);
    computeGoals();computeAssists();computeCards();
    document.getElementById('loading').style.display='none';
    showView('forside');
    startLivePolling();
  }catch{
    document.getElementById('loading').style.display='none';
    document.getElementById('errbox').style.display='block';
  }
}
loadData();


/* ── Swipe mellom faner ── */
(function(){
  const VIEWS=['forside','kamper','kalender','grupper','sluttspill','statistikk'];
  let sx=0,sy=0;
  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<45||Math.abs(dy)>Math.abs(dx)*0.65)return;
    if(dx>0){
      if(document.getElementById('playerModal').style.display!=='none'){closePlayerModal();return}
      if(document.getElementById('teamModal').style.display!=='none'){closeTeamModal();return}
      if(document.getElementById('matchModal').style.display!=='none'){closeModal();return}
    }
    if(document.getElementById('matchModal').style.display!=='none')return;
    if(document.getElementById('teamModal').style.display!=='none')return;
    if(document.getElementById('playerModal').style.display!=='none')return;
    const i=VIEWS.indexOf(currentView);if(i===-1)return;
    const ni=dx<0?Math.min(i+1,VIEWS.length-1):Math.max(i-1,0);
    if(ni!==i)showView(VIEWS[ni]);
  },{passive:true});
})();
