<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VM 2026">
  <title>VM-Kampprogram 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="trophy.png">
  <style>
    @font-face{font-family:'Press Start 2P';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/d85064eaed4b8683-s.woff2') format('woff2');unicode-range:u+0100-02ba,u+02bd-02c5,u+02c7-02cc,u+02ce-02d7,u+02dd-02ff,u+0304,u+0308,u+0329,u+1d00-1dbf,u+1e00-1e9f,u+1ef2-1eff,u+2020,u+20a0-20ab,u+20ad-20c0,u+2113,u+2c60-2c7f,u+a720-a7ff}
    @font-face{font-family:'Press Start 2P';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/db234bd00cda6a96-s.p.woff2') format('woff2');unicode-range:u+00??,u+0131,u+0152-0153,u+02bb-02bc,u+02c6,u+02da,u+02dc,u+0304,u+0308,u+0329,u+2000-206f,u+20ac,u+2122,u+2191,u+2193,u+2212,u+2215,u+feff,u+fffd}
    @font-face{font-family:'VT323';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/751eccb0decf5e18-s.woff2') format('woff2');unicode-range:u+0102-0103,u+0110-0111,u+0128-0129,u+0168-0169,u+01a0-01a1,u+01af-01b0,u+0300-0301,u+0303-0304,u+0308-0309,u+0323,u+0329,u+1ea0-1ef9,u+20ab}
    @font-face{font-family:'VT323';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/f6590a0f07a97750-s.woff2') format('woff2');unicode-range:u+0100-02ba,u+02bd-02c5,u+02c7-02cc,u+02ce-02d7,u+02dd-02ff,u+0304,u+0308,u+0329,u+1d00-1dbf,u+1e00-1e9f,u+1ef2-1eff,u+2020,u+20a0-20ab,u+20ad-20c0,u+2113,u+2c60-2c7f,u+a720-a7ff}
    @font-face{font-family:'VT323';font-style:normal;font-weight:400;font-display:swap;src:url('fonts/b7bd7951037de757-s.p.woff2') format('woff2');unicode-range:u+00??,u+0131,u+0152-0153,u+02bb-02bc,u+02c6,u+02da,u+02dc,u+0304,u+0308,u+0329,u+2000-206f,u+20ac,u+2122,u+2191,u+2193,u+2212,u+2215,u+feff,u+fffd}

    *,*::before,*::after{box-sizing:border-box;border:0 solid;margin:0;padding:0}
    h1,h2,h3,h4,h5,h6{font-size:inherit;font-weight:inherit}ol,ul{list-style:none}
    img{display:block;max-width:100%;height:auto}button{cursor:pointer;font-family:inherit;background:none;touch-action:manipulation}
    button,[data-midx],[data-team],[data-st],[data-view]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    table{border-collapse:collapse}:root{color-scheme:dark}
    body{font-family:'VT323',ui-monospace,monospace;background:#056cc3;color:#f4ecc8;
      -webkit-font-smoothing:antialiased;font-size:21px;line-height:1.35;min-height:100vh}
    .stadium-bg{position:fixed;top:0;right:0;bottom:0;left:0;z-index:-2;background:#056cc3 url('stadium.png') top/cover no-repeat;image-rendering:pixelated}
    .stadium-overlay{position:fixed;inset:0;z-index:-1;
      background:radial-gradient(120% 60% at 50% 0,rgba(246,212,90,.12),transparent 55%),
      linear-gradient(180deg,rgba(8,22,8,.15),rgba(8,20,8,.45) 38%,rgba(5,14,5,.86))}

    /* ── PIXEL DESIGN ── */
    .logo-text{font-family:'Press Start 2P',monospace;color:#f6d45a;letter-spacing:.01em;line-height:1.1;
      text-shadow:-3px 0 0 #3a2a0c,3px 0 0 #3a2a0c,0 -3px 0 #3a2a0c,0 3px 0 #3a2a0c,3px 3px 0 #b87d26,5px 5px 0 #6e4a16,9px 10px 0 rgba(0,0,0,.45)}
    .pixel-panel{background:linear-gradient(180deg,#2c5625,#214b1f 58%,#19390f);border:3px solid #e8be4a;
      box-shadow:0 0 0 3px #6e4a16,inset 0 0 0 2px rgba(246,212,90,.18),6px 8px 0 rgba(0,0,0,.45);overflow:hidden}
    .group-header{font-family:'Press Start 2P',monospace;
      background:linear-gradient(180deg,#f6d45a,#e8be4a 50%,#d7a13b);color:#4a3208;
      border-bottom:3px solid #6e4a16;text-shadow:0 1px 0 rgba(255,255,255,.35);padding:.45rem .75rem;font-size:11px}
    .flag-img   {image-rendering:pixelated;display:inline-block;flex-shrink:0;border:1px solid rgba(0,0,0,.4);width:36px;height:24px}
    .flag-img-sm{image-rendering:pixelated;display:inline-block;flex-shrink:0;border:1px solid rgba(0,0,0,.4);width:27px;height:18px}
    .flag-img-xs{image-rendering:pixelated;display:inline-block;flex-shrink:0;border:1px solid rgba(0,0,0,.4);width:20px;height:14px}
    .flag-img-lg{image-rendering:pixelated;display:inline-block;flex-shrink:0;border:1px solid rgba(0,0,0,.4);width:60px;height:40px}

    @keyframes btn-blink{
      from{filter:brightness(1.25);text-shadow:0 0 6px rgba(255,255,255,.35)}
      to  {filter:brightness(1.75) drop-shadow(0 0 5px rgba(246,212,90,.85));text-shadow:0 0 12px rgba(255,255,255,.8)}
    }
    @keyframes btn-blink-sm{
      from{filter:brightness(1.2)}
      to  {filter:brightness(1.65) drop-shadow(0 0 4px rgba(246,212,90,.7))}
    }
    /* Filter buttons */
    .fbtn{font-family:'Press Start 2P',monospace;text-transform:uppercase;font-size:8px;padding:.28rem .5rem;
      border-width:2px;border-style:solid;box-shadow:2px 3px 0 rgba(0,0,0,.55);
      transition:transform .08s,box-shadow .08s;
      background:#1a2e1a;color:rgba(244,236,200,.5);border-color:#2e4a2e #0d1a0d #0d1a0d #2e4a2e}
    .fbtn:hover{
      transform:translateY(-2px);
      box-shadow:2px 5px 0 rgba(0,0,0,.6),0 0 6px rgba(246,212,90,.3);
      animation:btn-blink-sm .3s linear alternate infinite}
    .fbtn:active{transform:translate(2px,2px);box-shadow:0 0;filter:brightness(.9);animation:none}
    .fbtn.fi{background:#c06000;color:#fff;border-color:#f08020 #7a3a00 #7a3a00 #f08020}
    .fbtn.fa{background:#e8be4a;color:#3a2a0c;border-color:#f6d45a #b87d26 #b87d26 #f6d45a}
    .fbtn.ff{background:#2e6329;color:#f4ecc8;border-color:#4a8a3c #16330f #16330f #4a8a3c}
    .fbtn.fk{background:#4c8fcb;color:#fff;border-color:#8fc0e8 #2c6699 #2c6699 #8fc0e8}
    .fbtn.fn{background:#ba0c2f;color:#fff;border-color:#e2415c #7a0820 #7a0820 #e2415c}
    .fbtn.fg{background:#e8be4a;color:#3a2a0c;border-color:#f6d45a #b87d26 #b87d26 #f6d45a}
    .fbtn.fz{background:#6b3fa0;color:#fff;border-color:#9b6fd0 #3d1f60 #3d1f60 #9b6fd0}
    .fsep{display:inline-block;width:1px;height:14px;background:rgba(232,190,74,.25);margin:0 .15rem;align-self:center}
    .view-nav{margin-top:1.5rem;display:flex;gap:.4rem;flex-wrap:wrap}
    .vbtn{font-family:'Press Start 2P',monospace;text-transform:uppercase;border-width:3px;border-style:solid;
      font-size:10px;padding:.45rem .7rem;box-shadow:4px 5px 0 rgba(0,0,0,.6);
      transition:transform .08s,box-shadow .08s}
    .vbtn:hover{
      transform:translateY(-3px);
      box-shadow:4px 8px 0 rgba(0,0,0,.7),0 0 12px rgba(246,212,90,.4);
      animation:btn-blink .3s linear alternate infinite}
    .vbtn:active{transform:translate(4px,4px);box-shadow:0 0;filter:brightness(.85);animation:none}
    .vbtn.off{background:#1a2e1a;color:rgba(244,236,200,.5);border-color:#2e4a2e #0d1a0d #0d1a0d #2e4a2e}
    .vbtn.on-forside{background:#c06000;color:#fff;border-color:#f08020 #7a3a00 #7a3a00 #f08020}
    .vbtn.on-kampprogram{background:#e8be4a;color:#3a2a0c;border-color:#f6d45a #b87d26 #b87d26 #f6d45a}
    .vbtn.on-kalender{background:#2e6329;color:#f4ecc8;border-color:#4a8a3c #16330f #16330f #4a8a3c}
    .vbtn.on-grupper{background:#6b3fa0;color:#fff;border-color:#9b6fd0 #3d1f60 #3d1f60 #9b6fd0}
    .vbtn.on-sluttspill{background:#4c8fcb;color:#fff;border-color:#8fc0e8 #2c6699 #2c6699 #8fc0e8}
    .vbtn.on-statistikk{background:#1a7a6e;color:#fff;border-color:#2ab8a8 #0d4a45 #0d4a45 #2ab8a8}
    /* Forside layout */
    .forside-duo{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:1rem;align-items:stretch}
    .forside-duo .pixel-panel{display:flex;flex-direction:column}
    .forside-duo .pixel-panel>div:last-child{flex:1;display:flex;flex-direction:column;gap:.35rem;padding-bottom:.35rem}
    .forside-duo .match-card{flex:1;margin-bottom:0}
    @media(max-width:600px){.forside-duo{grid-template-columns:1fr}}
    .filter-row{margin-top:.55rem;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
    .flabel{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(244,236,200,.45);margin-right:.1rem}
    .container{max-width:1280px;margin:0 auto;padding:env(safe-area-inset-top) 1.25rem 4rem}
    header{padding:2.25rem 0 1.25rem;text-align:center}
    .trophy-img{image-rendering:pixelated;width:auto;height:120px;margin:0 auto .7rem;filter:drop-shadow(0 8px 0 rgba(0,0,0,.35))}
    .header-sub{font-size:18px;color:rgba(244,236,200,.7);margin-top:.6rem}
    #subHeader{display:none;align-items:center;gap:.6rem;padding:.8rem 0 .5rem}
    #subHeader img{height:52px;width:auto;image-rendering:pixelated;filter:drop-shadow(0 3px 0 rgba(0,0,0,.4))}
    #subHeader h2{font-family:'Press Start 2P',monospace;font-size:clamp(1.05rem,4vw,2.3rem);color:#f6d45a;text-shadow:2px 2px 0 rgba(0,0,0,.55);line-height:1.2}
    @media(max-width:480px){#subHeader img{height:40px}}

    /* Heia Norge */
    .norge-section{margin-top:1.5rem}.norge-grid{display:grid;gap:.6rem}
    @media(min-width:600px){.norge-grid{grid-template-columns:repeat(3,1fr)}}
    .norge-mini{background:linear-gradient(180deg,#5c2525,#4b1a1a 58%,#390f0f);border:2px solid #e8be4a;box-shadow:0 0 0 2px #6e4a16,3px 4px 0 rgba(0,0,0,.4);padding:.5rem .65rem}
    .mini-date{font-family:'Press Start 2P',monospace;font-size:11px;color:rgba(244,236,200,.55);margin-bottom:.3rem}
    .mini-teams{display:flex;align-items:center;gap:.35rem;font-size:25px;flex-wrap:wrap}
    .mini-res{font-size:28px;margin-top:.1rem}
    .c-win{color:#5ae05a}.c-draw{color:#f6d45a}.c-loss{color:#e05a5a}.c-muted{color:rgba(244,236,200,.45)}

    /* Match card */
    .match-card{background:linear-gradient(180deg,#2c5625,#214b1f 58%,#19390f);
      border:2px solid #e8be4a;box-shadow:0 0 0 2px #6e4a16,inset 0 0 0 1px rgba(246,212,90,.09),3px 4px 0 rgba(0,0,0,.38);
      margin-bottom:.35rem;padding:.45rem .8rem;cursor:pointer;
      display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.4rem;
      transition:transform .08s,box-shadow .08s,filter .08s}
    .match-card.nc{background:linear-gradient(180deg,#5c2525,#4b1a1a 58%,#390f0f)}
    .match-card.kc{border-color:#f6d45a}
    .match-card:hover{filter:brightness(1.18);transform:translateY(-2px);box-shadow:0 0 0 2px #6e4a16,inset 0 0 0 1px rgba(246,212,90,.12),3px 6px 0 rgba(0,0,0,.5),0 0 10px rgba(232,190,74,.2)}
    .match-card:active{transform:translate(3px,4px);box-shadow:0 0 0 2px #6e4a16;filter:brightness(.95)}
    .ts{display:flex;align-items:center;gap:.4rem;min-width:0}
    .ts.r{flex-direction:row-reverse;text-align:right}
    .tn{font-size:21px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tn.no{color:#f6d45a}
    .mc{text-align:center;min-width:82px;flex-shrink:0}
    .ms{font-family:'Press Start 2P',monospace;font-size:17px;color:#f6d45a;letter-spacing:.05em}
    .mt{font-family:'Press Start 2P',monospace;font-size:13px;color:rgba(244,236,200,.8)}
    .mm{font-size:18px;color:rgba(244,236,200,.45);margin-top:.18rem}
    .mb{display:inline-block;font-family:'Press Start 2P',monospace;font-size:9px;padding:.15rem .4rem;margin-top:.22rem}
    .b-fin{background:rgba(22,163,74,.3);color:#5ae05a;border:1px solid #5ae05a}
    .b-idag{background:rgba(192,96,0,.35);color:#f08020;border:1px solid #f08020}
    .b-kom{background:rgba(0,0,0,.3);color:rgba(244,236,200,.4);border:1px solid rgba(244,236,200,.18)}
    .mr{font-family:'Press Start 2P',monospace;font-size:9px;color:rgba(244,236,200,.35);margin-top:.15rem}
    .match-list{margin-top:1.25rem}.date-sec{margin-bottom:1.1rem}

    /* ═══════════════════════════════════════════════
       MATCH MODAL
    ═══════════════════════════════════════════════ */
    #matchModal{position:fixed;inset:0;z-index:504;display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,.85);padding:1rem;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
    .modal-card{max-width:580px;width:100%;max-height:92vh;overflow-y:auto;position:relative;
      padding:1.1rem 1.2rem 1.4rem;scrollbar-width:thin;scrollbar-color:#e8be4a #1a2e1a}
    .modal-card::-webkit-scrollbar{width:6px}
    .modal-card::-webkit-scrollbar-track{background:#1a2e1a}
    .modal-card::-webkit-scrollbar-thumb{background:#e8be4a;border-radius:0}
    .modal-close-btn{position:absolute;top:.55rem;right:.55rem;
      font-family:'Press Start 2P',monospace;font-size:8px;
      background:#ba0c2f;color:#fff;border:2px solid #e2415c;border-bottom-color:#7a0820;border-right-color:#7a0820;
      padding:.3rem .55rem;box-shadow:2px 2px 0 rgba(0,0,0,.5);transition:filter .1s}
    .modal-close-btn:hover{filter:brightness(1.2)}

    /* Modal header */
    .modal-badge{font-family:'Press Start 2P',monospace;font-size:8px;
      background:linear-gradient(180deg,#f6d45a,#e8be4a 50%,#d7a13b);color:#4a3208;
      padding:.25rem .65rem;display:inline-block;margin-bottom:.5rem}
    .modal-meta{font-size:16px;color:rgba(244,236,200,.65);margin-bottom:.2rem}
    .modal-venue{font-size:16px;color:rgba(244,236,200,.45);margin-bottom:.8rem}

    /* Match score area */
    .modal-score-area{
      display:grid;grid-template-columns:1fr auto 1fr;
      align-items:start;gap:.5rem;margin:.5rem 0 .8rem}
    .modal-team-col{display:flex;flex-direction:column;align-items:center;gap:.4rem;text-align:center}
    .modal-tname{font-size:23px;line-height:1.1}
    .modal-tname.no{color:#f6d45a}
    .modal-team-col.win .modal-tname{color:#5ae05a}
    .modal-ctr-col{text-align:center;flex-shrink:0;padding-top:.2rem}
    .modal-ft{font-family:'Press Start 2P',monospace;font-size:26px;color:#f6d45a;line-height:1}
    .modal-ht{font-size:14px;color:rgba(244,236,200,.45);margin-top:.3rem}
    .modal-status{font-size:14px;margin-top:.2rem}
    .modal-status.fin{color:#5ae05a}
    .modal-status.tod{color:#f08020}
    .modal-vs{font-family:'Press Start 2P',monospace;font-size:15px;color:rgba(244,236,200,.35);margin:.3rem 0}
    .modal-stime{font-family:'Press Start 2P',monospace;font-size:11px;color:#f4ecc8;margin-top:.2rem}

    /* Events section */
    .ev-section{margin-top:.8rem;border-top:1px solid rgba(232,190,74,.2);padding-top:.7rem}
    .ev-hdr{font-family:'Press Start 2P',monospace;font-size:8px;color:rgba(244,236,200,.5);
      margin-bottom:.5rem;letter-spacing:.05em}
    .ev-grid{display:grid;grid-template-columns:1fr 44px 1fr;gap:0}
    .ev-row{display:contents}
    .ev-l{padding:2px 4px 2px 0;font-size:16px;text-align:right;line-height:1.3;color:rgba(244,236,200,.85)}
    .ev-m{padding:2px 2px;font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(244,236,200,.4);
      text-align:center;white-space:nowrap;line-height:1.9}
    .ev-r{padding:2px 0 2px 4px;font-size:16px;text-align:left;line-height:1.3;color:rgba(244,236,200,.85)}
    .ev-row:hover .ev-l,.ev-row:hover .ev-m,.ev-row:hover .ev-r{background:rgba(246,212,90,.05)}
    /* Simple list (no team info) */
    .ev-list-item{font-size:16px;color:rgba(244,236,200,.82);padding:2px 0;line-height:1.35}
    .ev-min{font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(244,236,200,.4);padding-left:.3rem}
    .ev-none{font-size:15px;color:rgba(244,236,200,.3);padding:.3rem 0}

    /* Match report (TheSportsDB) */
    .sdb-section{margin-top:.8rem;border-top:1px solid rgba(232,190,74,.2);padding-top:.7rem}
    .sdb-stats{font-size:15px;color:rgba(244,236,200,.55);margin-bottom:.35rem}
    .sdb-report{font-size:16px;color:rgba(244,236,200,.78);line-height:1.6;margin:.5rem 0}
    .sdb-link{color:#f6d45a;font-size:16px;text-decoration:underline;text-underline-offset:2px}
    .sdb-loading{font-size:15px;color:rgba(244,236,200,.3);padding:.5rem 0;margin-top:.8rem;border-top:1px solid rgba(232,190,74,.2)}

    /* ═══════════════════════════════
       KALENDER
    ═══════════════════════════════ */
    .cal-wrap{margin-top:1rem;display:flex;flex-direction:column;gap:1.5rem}
    .cal-month-hdr{font-size:18px;text-align:center;padding:.5rem}
    .cal-grid{display:grid;gap:3px;margin-top:3px}
    .cal-head{font-family:'Press Start 2P',monospace;font-size:10px;color:#4a3208;
      background:linear-gradient(180deg,#f6d45a,#e8be4a 50%,#d7a13b);
      text-align:center;padding:.4rem .1rem;border-bottom:2px solid #6e4a16}
    .cal-day{background:linear-gradient(180deg,#1e3d19,#172f12);border:1.5px solid rgba(232,190,74,.28);padding:5px 4px;overflow:hidden}
    .cal-day.empty{background:rgba(0,0,0,.14);border-color:rgba(232,190,74,.07)}
    .cal-day.today{border-color:#f6d45a;border-width:2px;box-shadow:0 0 0 1.5px #6e4a16}
    .cal-num{font-family:'Press Start 2P',monospace;font-size:9px;color:rgba(244,236,200,.38);margin-bottom:5px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cal-num.tday{color:#f6d45a}
    .cal-mrow{display:flex;align-items:center;justify-content:space-between;gap:2px;margin-bottom:2px;
      padding:2px 3px;background:rgba(0,0,0,.22);border-left:2px solid transparent;overflow:hidden;
      cursor:pointer;transition:filter .1s}
    .cal-mrow:hover{filter:brightness(1.3)}
    .cal-mrow.m-nor{background:rgba(186,12,47,.28);border-left-color:#e2415c}
    .cal-mrow.m-ko{background:rgba(76,143,203,.18);border-left-color:#4c8fcb}
    .cal-mrow.m-fin{opacity:.8}
    .cal-side{display:flex;align-items:center;gap:2px;flex:1;min-width:0}
    .cal-side.right{flex-direction:row-reverse}
    .cal-ctr{flex-shrink:0;padding:0 2px;text-align:center;min-width:32px}
    .cfl{image-rendering:pixelated;width:18px;height:12px;flex-shrink:0;border:1px solid rgba(0,0,0,.35)}
    .ctn{font-size:15px;color:rgba(244,236,200,.72);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
    .csc{font-family:'Press Start 2P',monospace;font-size:11px;color:#f6d45a;white-space:nowrap;line-height:1}
    .ctm{font-size:15px;color:rgba(244,236,200,.5);white-space:nowrap;line-height:1}
    .cmore{font-size:13px;color:rgba(244,236,200,.3);text-align:center;padding:2px 0}

<script>
const WCUP_URL='https://wcup2026.org/api/data.php';
const SDB_BASE='https://www.thesportsdb.com/api/v1/json/3';

/* ── CACHE ── */
function cacheGet(key,ttl){try{const r=localStorage.getItem(key);if(!r)return null;const o=JSON.parse(r);return Date.now()-o.ts<ttl?o.d:null}catch{return null}}
function cacheSet(key,d){try{localStorage.setItem(key,JSON.stringify({ts:Date.now(),d}))}catch{}}

/* ── wcup2026.org ── */
function mapWCMatch(raw){
  const scoreRaw=raw.score;
  let ft=null;
  if(Array.isArray(scoreRaw))ft=scoreRaw;
  else if(typeof scoreRaw==='string'&&scoreRaw.trim()){
    const p=scoreRaw.trim().split(/\s+/).map(Number);
    if(p.length===2&&!isNaN(p[0])&&!isNaN(p[1]))ft=p;
  }
  const d=raw.datetime?new Date(raw.datetime*1000):null;
  const utcDate=d?`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`:(raw.date||'');
  const time=d?`${d.getUTCHours().toString().padStart(2,'0')}:${d.getUTCMinutes().toString().padStart(2,'0')} UTC+0`:'';
  return{_wcId:raw.id,date:utcDate,time,team1:raw.team1,team2:raw.team2,
    group:raw.group||null,round:raw.round||null,ground:raw.ground||null,
    status:raw.status,live_minute:raw.live_minute||null,score:ft?{ft}:null,
    goals1:raw.goals1||[],goals2:raw.goals2||[]};
}

async function fetchWCMatchDetail(wcId,m,midx){
  const ttl=(m.score?.ft&&!isLive(m))?Number.MAX_SAFE_INTEGER:2*60*1000;
  let detail=cacheGet('wc_m_'+wcId,ttl);
  if(!detail){
    try{
      const r=await fetch(`${WCUP_URL}?action=match&id=${wcId}`);
      if(!r.ok)return;
      const j=await r.json();detail=j.match||null;
      if(detail)cacheSet('wc_m_'+wcId,detail);
    }catch{return}
  }
  if(!detail||currentModalIdx!==midx)return;
  if(!m.score)m.score={};
  if(Array.isArray(detail.score))m.score.ft=detail.score;
  if(detail.ht)m.score.ht=detail.ht;
  if(!m.goals1?.length)m.goals1=detail.goals1||[];
  if(!m.goals2?.length)m.goals2=detail.goals2||[];
  if(!m.cards?.length&&detail.cards?.length)
    m.cards=detail.cards.map(c=>({name:c.name,minute:c.minute,type:c.type,result:c.type,
      team:c.team===1?m.team1:m.team2,reason:c.reason_en||''}));
  const evSect=document.querySelector('#modalContent .ev-section');
  if(evSect)evSect.outerHTML=buildEventsHTML(m);
  if(detail.stats?.length){
    let stats=detail.stats;
    if(m.cards?.length){
      const yc1=m.cards.filter(c=>c.team===m.team1&&!(c.type||'').toLowerCase().includes('red')).length;
      const yc2=m.cards.filter(c=>c.team===m.team2&&!(c.type||'').toLowerCase().includes('red')).length;
      const rc1=m.cards.filter(c=>c.team===m.team1&&(c.type||'').toLowerCase().includes('red')).length;
      const rc2=m.cards.filter(c=>c.team===m.team2&&(c.type||'').toLowerCase().includes('red')).length;
      stats=stats.map(s=>{
        if(s.k_en==='Yellow cards')return{...s,v:[yc1,yc2]};
        if(s.k_en==='Red cards')return{...s,v:[rc1,rc2]};
        return s;
      });
    }
    renderWCStats(stats,midx);
  }
  computeGoals();computeAssists();computeCards();
}

function renderWCStats(stats,midx){
  if(currentModalIdx!==midx)return;
  const el=document.getElementById('modal-stats-sect');if(!el)return;
  const NO={'Possession':'Ballbesittelse','Shots':'Skudd totalt','Shots on target':'Skudd på mål',
    'Corners':'Corner','Fouls':'Frispark','Offsides':'Offsider',
    'Yellow cards':'Gule kort','Red cards':'Røde kort','Saves':'Redninger'};
  let html='<div class="ev-section"><div class="ev-hdr">Kampstatistikk</div><div class="stats-grid">';
  for(const s of stats){
    const lbl=NO[s.k_en]||s.k_en;const[v1,v2]=s.v;
    const isPct=s.unit==='%';const tot=isPct?100:(v1+v2)||1;
    const p1=isPct?v1:Math.round(100*v1/tot);const p2=100-p1;
    html+=`<div class="stat-row">
      <span class="stat-val-l">${v1}${isPct?'%':''}</span>
      <div class="stat-bar-wrap"><div class="stat-bar-l" style="width:${p1}%"></div>
        <span class="stat-lbl">${lbl}</span>
        <div class="stat-bar-r" style="width:${p2}%"></div></div>
      <span class="stat-val-r">${v2}${isPct?'%':''}</span>
    </div>`;
  }
  el.innerHTML=html+'</div></div>';
}

async function fetchWCScorers(){
  let scorers=cacheGet('wc_scorers',30*60*1000);
  if(!scorers){
    try{
      const r=await fetch(`${WCUP_URL}?action=scorers`);
      if(!r.ok)return;
      const j=await r.json();scorers=j.scorers||[];
      if(scorers.length)cacheSet('wc_scorers',scorers);
    }catch{return}
  }
  wcScorers={};wcScorerTeams={};
  for(const s of scorers){
    if(!s.name||!s.goals)continue;
    const k=s.name.toUpperCase();
    wcScorers[k]=s.goals;
    if(s.team)wcScorerTeams[k]=s.team;
  }
  computeGoals();
  if(currentView==='statistikk')showView('statistikk');
}

async function fetchLiveMatches(){
  try{
    const r=await fetch(`${WCUP_URL}?action=live`);
    if(!r.ok)return;
    const j=await r.json();
    const prev=JSON.stringify(liveMatches.map(m=>m._wcId+':'+JSON.stringify(m.score)));
    const raw=j.matches||j.live||j.data||(Array.isArray(j)?j:[]);
    liveMatches=raw.map(mapWCMatch);
    for(const lm of liveMatches){
      const m=allMatches.find(m=>m._wcId===lm._wcId||(m.team1===lm.team1&&m.team2===lm.team2));
      if(m){m.status=lm.status;m.live_minute=lm.live_minute;if(lm.score)m.score=lm.score;}
    }
    const curr=JSON.stringify(liveMatches.map(m=>m._wcId+':'+JSON.stringify(m.score)));
    if(currentView==='forside'&&(prev!==curr||liveMatches.length))renderForside();
  }catch{}
}

function startLivePolling(){
  if(liveInterval)return;
  fetchLiveMatches();
  liveInterval=setInterval(fetchLiveMatches,60*1000);
}

const LIVE_DEAD=new Set(['','upcoming','scheduled','finished','complete','completed','ns','tbd','ft','aet','pen','pso']);
function buildLiveHTML(){
  const liveIds=new Set(liveMatches.map(m=>m._wcId));
  const fromAll=allMatches.filter(m=>!liveIds.has(m._wcId)&&m.status&&!LIVE_DEAD.has((m.status||'').toLowerCase())&&!m.score?.ft);
  const combined=[...liveMatches,...fromAll];
  if(!combined.length)return'';
  let html='<div class="pixel-panel live-panel" style="margin-bottom:1rem"><div class="group-header"><span class="live-dot"></span>LIVE NÅ</div><div style="padding:.3rem .4rem .05rem">';
  for(const lm of combined){
    const idx=allMatches.findIndex(m=>m._wcId===lm._wcId||(m.team1===lm.team1&&m.team2===lm.team2));
    const m=idx>=0?allMatches[idx]:lm;
    const sc=m.score?.ft,t1=m.team1||'?',t2=m.team2||'?';
    const isN=t1==='Norway'||t2==='Norway';
    const lbl=m.group?(GROUP_NO[m.group]||m.group):(ROUND_NO[m.round]||m.round||'');
    const minRaw=m.live_minute||(m.status==='HT'?'HT':(!LIVE_DEAD.has((m.status||'').toLowerCase())?m.status:''));
    const minStr=minRaw?`${minRaw}${/^\d+$/.test(String(minRaw))?"'":''}`:' ';
    const ctr=`<div class="ms">${sc?sc[0]:'–'}&thinsp;–&thinsp;${sc?sc[1]:'–'}</div><div class="mm">${minStr}</div>`;
    const badge=`<span class="mb" style="background:rgba(200,0,0,.25);color:#f04040;border:1px solid #c03030"><span class="live-dot" style="width:6px;height:6px;display:inline-block;vertical-align:middle;margin-right:3px"></span>LIVE</span>`;
    html+=`<div class="match-card${isN?' nc':''}" data-midx="${idx>=0?idx:''}">
      <div class="ts">${flagEl(t1)}<span class="tn${t1==='Norway'?' no':''}">${tn(t1)}</span></div>
      <div class="mc">${ctr}${badge}<div class="mr">${lbl}</div></div>
      <div class="ts r">${flagEl(t2)}<span class="tn${t2==='Norway'?' no':''}">${tn(t2)}</span></div>
    </div>`;
  }
  return html+'</div></div>';
}

let allMatches=[],liveMatches=[],liveInterval=null,currentView='forside',currentStatus='idag',currentGroup='alle',currentZoom='fire',currentModalIdx=-1;

/* ── HELPERS ── */
function tn(t){return TEAM_NO[t]||t||'?'}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}
function sdbName(t){return SDB_NAME[t]||t}

}

}

/* ── TIME ── */
function parseDT(ds,ts){
  if(!ts||!ds)return null;
  const m=ts.match(/^(\d{2}):(\d{2})\s+UTC([+-]\d+(?:\.\d+)?)$/);
  if(!m)return null;
  const[,h,mi,off]=m,o=parseFloat(off),sign=o>=0?'+':'-';
  const ah=String(Math.floor(Math.abs(o))).padStart(2,'0');
  const am=String(Math.round((Math.abs(o)%1)*60)).padStart(2,'0');
  try{return new Date(`${ds}T${h}:${mi}:00${sign}${ah}:${am}`)}catch{return null}
}
function osloStr(dt){return dt?dt.toLocaleString('sv-SE',{timeZone:'Europe/Oslo'}):null}
function osloDate(dt){const s=osloStr(dt);return s?s.slice(0,10):null}
function osloHour(dt){const s=osloStr(dt);return s?parseInt(s.slice(11,13)):null}
function fmtTime(dt){return dt?dt.toLocaleTimeString('nb-NO',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Oslo'}):'?'}
function fmtLong(dt){return dt?cap(dt.toLocaleDateString('nb-NO',{weekday:'long',day:'numeric',month:'long',timeZone:'Europe/Oslo'})):'?'}
function fmtShort(dt){return dt?dt.toLocaleDateString('nb-NO',{day:'numeric',month:'short',timeZone:'Europe/Oslo'}):'?'}
function todayStr(){return new Date().toLocaleString('sv-SE',{timeZone:'Europe/Oslo'}).slice(0,10)}
function calToday(){
  const now=new Date(),h=osloHour(now);
  if(h!==null&&h<7){const d=new Date(now);d.setDate(d.getDate()-1);return d.toLocaleString('sv-SE',{timeZone:'Europe/Oslo'}).slice(0,10)}
  return todayStr()
}
function calDate(m){
  const dt=parseDT(m.date,m.time);
  if(!dt)return m.date||'';
  const h=osloHour(dt),d=osloDate(dt);
  if(h!==null&&h<7){const p=new Date(d+'T12:00:00');p.setDate(p.getDate()-1);return p.toISOString().slice(0,10)}
  return d||m.date||'';
}
function isMatchToday(m){return calDate(m)===calToday()}

/* ── FILTERS ── */
function applyFilters(matches){
  if(currentGroup==='norge')     matches=matches.filter(m=>m.team1==='Norway'||m.team2==='Norway');
  else if(currentGroup!=='alle') matches=matches.filter(m=>m.group===currentGroup);
  if(currentStatus==='idag')          matches=matches.filter(isMatchToday);
  else if(currentStatus==='ferdige')  matches=matches.filter(m=>m.score?.ft);
  else if(currentStatus==='kommende') matches=matches.filter(m=>!m.score?.ft);
  return matches;
}

function isLive(m){
  return liveMatches.some(lm=>lm._wcId===m._wcId)||
    (m.status&&!LIVE_DEAD.has((m.status||'').toLowerCase())&&!m.score?.ft);
}

  const lbl=m.group?(GROUP_NO[m.group]||m.group):(ROUND_NO[m.round]||m.round||'');
  const live=isLive(m),fin=!!sc&&!live,tod=!fin&&!live&&isMatchToday(m);
  const minRaw=m.live_minute||(m.status==='HT'?'HT':(!LIVE_DEAD.has((m.status||'').toLowerCase())?m.status:''));
  const minStr=minRaw?`${minRaw}${/^\d+$/.test(String(minRaw))?"'":''}`:' ';

      ?`<div class="ms">${sc[0]}&thinsp;–&thinsp;${sc[1]}</div><div class="mm">${fmtTime(dt)}</div>`
      :`<div class="mt">${dt?fmtTime(dt):'TBD'}</div><div class="mm">Avspark</div>`;
  const bc=fin?'b-fin':tod?'b-idag':'b-kom',bt=fin?'Ferdig':tod?'I dag':'Kommende';
  const badge=live
    ?`<span class="mb" style="background:rgba(200,0,0,.25);color:#f04040;border:1px solid #c03030"><span class="live-dot" style="width:6px;height:6px;display:inline-block;vertical-align:middle;margin-right:3px"></span>LIVE</span>`
    :`<span class="mb ${bc}">${bt}</span>`;
  return`<div class="match-card${isN?' nc':''}${isKO?' kc':''}" data-midx="${idx}">
    <div class="ts">${flagEl(t1)}<span class="tn${t1==='Norway'?' no':''}">${tn(t1)}</span></div>
    <div class="mc">${ctr}${badge}<div class="mr">${lbl}</div></div>
    <div class="ts r">${flagEl(t2)}<span class="tn${t2==='Norway'?' no':''}">${tn(t2)}</span></div>
  </div>`;
}

/* Build sorted events list from match data */
function getEvents(m){
  const evs=[];
  /* openfootball 2026: goals1/goals2 are team-separated arrays */
  ;(m.goals1||[]).forEach(g=>evs.push({
    min:parseInt(g.minute)||0,type:'goal',
    name:g.name||'?',team:m.team1,og:!!g.owngoal
  }));
  ;(m.goals2||[]).forEach(g=>evs.push({
    min:parseInt(g.minute)||0,type:'goal',
    name:g.name||'?',team:m.team2,og:!!g.owngoal
  }));
  /* legacy flat goals array (future-proofing) */
  ;(m.goals||[]).forEach(g=>evs.push({
    min:parseInt(g.minute||g.min)||0,type:'goal',
    name:g.name||g.player||'?',team:g.team||null,
    og:!!(g.name||'').toLowerCase().includes('o.g.')||!!g.owngoal
  }));
  ;(m.cards||m.bookings||[]).forEach(c=>{
    const r=(c.result||c.type||'').toLowerCase();
    evs.push({min:parseInt(c.minute||c.min)||0,type:r.includes('red')?'red':'yellow',
      name:c.name||c.player||'?',team:c.team||null})
  });
  ;(m.subs||m.substitutions||[]).forEach(s=>evs.push({
    min:parseInt(s.minute||s.min)||0,type:'sub',
    name:s.name||s.playerOut||'?',nameIn:s.nameIn||s.playerIn||'',team:s.team||null
  }));
  return evs.sort((a,b)=>a.min-b.min);
}

function evIcon(type){return{goal:'⚽',yellow:'🟨',red:'🟥',sub:'🔄'}[type]||'•'}
function evLabel(ev){
  if(ev.type==='sub')return`${ev.nameIn} ↑ / ${ev.name} ↓`;
  if(ev.og)return`${ev.name} (e.m.)`;
  return ev.name;
}

function buildEventsHTML(m){
  const evs=getEvents(m);

/* ── TheSportsDB: match metadata (report, attendance, video) ── */
const sdbCache={};
async function fetchSDBMatch(midx){
  if(midx in sdbCache)return sdbCache[midx];
  const m=allMatches[midx];if(!m){sdbCache[midx]=null;return null}
  const n1=sdbName(m.team1),n2=sdbName(m.team2);
  for(const[a,b] of[[n1,n2],[n2,n1]]){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),8000);
      const url=`${SDB_BASE}/searchevents.php?e=${encodeURIComponent(a+' vs '+b)}`;
      const res=await fetch(url,{signal:ctrl.signal});
      clearTimeout(tid);
      if(!res.ok)continue;
      const data=await res.json();
      const evts=data.event||[];
      if(!evts.length)continue;
      const target=new Date(m.date+'T12:00:00Z').getTime();
      const ev=evts.find(e=>e.dateEvent&&Math.abs(new Date(e.dateEvent+'T12:00:00Z').getTime()-target)<3*86400000)||evts[0];
      if(!ev)continue;
      sdbCache[midx]=ev;return ev;
    }catch{/* timeout or network */}
  }
  sdbCache[midx]=null;return null;
}

function escHtml(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function buildSDBSection(ev,m){
  if(!ev)return'';
  let html='<div class="sdb-section">';
  const stats=[];
  const spec=ev.intSpectators?parseInt(ev.intSpectators):0;
  if(spec>0)stats.push(`👥 ${spec.toLocaleString('nb-NO')}`);
  if(stats.length)html+=`<div class="sdb-stats">${stats.join(' · ')}</div>`;
  if(ev.strResult){
    const paras=ev.strResult.replace(/\r\n/g,'\n').split('\n\n').filter(Boolean);
    html+=`<div class="ev-hdr" style="margin-top:.55rem">Kamprapport</div>`;
    html+=`<div class="sdb-report">${escHtml(paras[0]||'')}</div>`;
  }
  if(ev.strVideo)html+=`<div style="margin-top:.5rem"><a class="sdb-link" href="${ev.strVideo}" target="_blank" rel="noopener">▶ Høydepunkter på YouTube</a></div>`;
  return html+'</div>';
}

/* ══ RENDER: GRUPPER ══ */
function calcStandings(gk){
  const gm=allMatches.filter(m=>m.group===gk);const teams={};
  gm.forEach(m=>{[m.team1,m.team2].forEach(t=>{if(t&&!teams[t])teams[t]={n:t,gp:0,w:0,d:0,l:0,gf:0,ga:0,pts:0}})});
  gm.forEach(m=>{if(!m.score?.ft)return;const[g1,g2]=m.score.ft;
    if(!teams[m.team1]||!teams[m.team2])return;
    teams[m.team1].gp++;teams[m.team2].gp++;teams[m.team1].gf+=g1;teams[m.team1].ga+=g2;teams[m.team2].gf+=g2;teams[m.team2].ga+=g1;
    if(g1>g2){teams[m.team1].w++;teams[m.team1].pts+=3;teams[m.team2].l++}
    else if(g1<g2){teams[m.team2].w++;teams[m.team2].pts+=3;teams[m.team1].l++}
    else{teams[m.team1].d++;teams[m.team1].pts++;teams[m.team2].d++;teams[m.team2].pts++}
  });
  return Object.values(teams).sort((a,b)=>{
    if(b.pts!==a.pts)return b.pts-a.pts;
    const da=a.gf-a.ga,db=b.gf-b.ga;if(db!==da)return db-da;
    if(b.gf!==a.gf)return b.gf-a.gf;return a.n.localeCompare(b.n);
  });
}

function drawMobileSVG(){
  const inner=document.getElementById('mbInner');if(!inner)return;
  const old=inner.querySelector('svg.mob-svg');if(old)old.remove();
  const sv=document.createElementNS('http://www.w3.org/2000/svg','svg');
  sv.className='mob-svg';
  sv.style.cssText='position:absolute;top:0;left:0;pointer-events:none;z-index:5;overflow:visible';
  sv.setAttribute('width',inner.scrollWidth);sv.setAttribute('height',inner.scrollHeight);
  inner.style.position='relative';
  const ir=inner.getBoundingClientRect();
  function mkPath(d,col,w){
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',d);p.setAttribute('stroke',col||'#e8be4a');
    p.setAttribute('stroke-width',w||'1.5');p.setAttribute('fill','none');p.setAttribute('stroke-opacity','.65');
    sv.appendChild(p);
  }
  function pair(id1,id2,pid,goRight){
    const e1=document.getElementById(`mbr${id1}`),e2=document.getElementById(`mbr${id2}`),ep=document.getElementById(`mbr${pid}`);
    if(!e1||!e2||!ep)return;
    const r1=e1.getBoundingClientRect(),r2=e2.getBoundingClientRect(),rp=ep.getBoundingClientRect();
    const y1=(r1.top+r1.bottom)/2-ir.top,y2=(r2.top+r2.bottom)/2-ir.top,yp=(rp.top+rp.bottom)/2-ir.top;
    const x1=goRight?r1.right-ir.left:r1.left-ir.left;
    const x2=goRight?r2.right-ir.left:r2.left-ir.left;
    const xp=goRight?rp.left-ir.left:rp.right-ir.left;
    const xm=(x1+xp)/2;
    mkPath(`M${x1} ${y1} H${xm} V${y2} H${x2} M${xm} ${yp} H${xp}`);
  }
  function arm(fid,tid,fRight,tLeft){
    const ef=document.getElementById(`mbr${fid}`),et=document.getElementById(`mbr${tid}`);
    if(!ef||!et)return;
    const rf=ef.getBoundingClientRect(),rt=et.getBoundingClientRect();
    const yf=(rf.top+rf.bottom)/2-ir.top,yt=(rt.top+rt.bottom)/2-ir.top;
    const xf=fRight?rf.right-ir.left:rf.left-ir.left;
    const xt=tLeft?rt.left-ir.left:rt.right-ir.left;
    const xm=(xf+xt)/2;
    mkPath(Math.abs(yf-yt)<3?`M${xf} ${yf} H${xt}`:`M${xf} ${yf} H${xm} V${yt} H${xt}`,'#f6d45a','1.5');
  }
  const gc=allMatches.findIndex(m=>!m.group);if(gc<0){inner.appendChild(sv);return}
  for(let i=0;i<4;i++)pair(gc+i*2,gc+i*2+1,gc+16+i,true);
  pair(gc+16,gc+17,gc+24,true);pair(gc+18,gc+19,gc+25,true);
  pair(gc+24,gc+25,gc+28,true);
  arm(gc+28,gc+31,true,true);
  for(let i=0;i<4;i++)pair(gc+8+i*2,gc+9+i*2,gc+20+i,false);
  pair(gc+20,gc+21,gc+26,false);pair(gc+22,gc+23,gc+27,false);
  pair(gc+26,gc+27,gc+29,false);
  arm(gc+29,gc+31,false,false);
  inner.appendChild(sv);
}

function parseTRef(r){if(!r)return'TBD';const wm=r.match(/^W(\d+)$/);if(wm)return`V.K${wm[1]}`;const gm=r.match(/^(\d+)([A-L])$/);if(gm)return`${gm[1]}.Gr${gm[2]}`;const tm=r.match(/^3([A-L]{2,})$/);if(tm)return`3.pl(${tm[1]})`;return tn(r)}
function isPH(r){return!r||!!r.match(/^[WL\d]/)}
function projectedKoTeam(ref){
  if(!ref||!isPH(ref))return null;
  const gm=ref.match(/^(\d+)([A-L])$/);
  if(!gm)return null;
  const rank=parseInt(gm[1]),st=calcStandings(`Group ${gm[2]}`);
  if(st.length>=rank&&st[rank-1].gp>0)return st[rank-1].n;
  return null;
}
function midxOf(m){return allMatches.findIndex(x=>x._wcId===m._wcId)}

function renderStatistikk(){
  computeGoals();
  const el=document.getElementById('vStatistikk');

  /* Build team lookup: player name → team */
  const playerTeam={};
  allMatches.forEach(m=>{
    [...(m.goals1||[])].forEach(g=>{if(g.name&&!g.owngoal)playerTeam[g.name.toUpperCase()]=m.team1});
    [...(m.goals2||[])].forEach(g=>{if(g.name&&!g.owngoal)playerTeam[g.name.toUpperCase()]=m.team2});
  });

  const scorers=Object.entries(playerGoals).sort((a,b)=>b[1]-a[1]);
  if(!scorers.length){
    el.innerHTML=`<div class="pixel-panel" style="margin-top:1rem"><div class="group-header">Toppscorere</div><div style="padding:1rem;font-size:16px;color:rgba(244,236,200,.4)">Ingen mål scoret ennå.</div></div>`;
    return;
  }

  /* Own goals for footnote */
  const ownGoals=[];
  allMatches.forEach(m=>{
    [...(m.goals1||[]),...(m.goals2||[])].forEach(g=>{if(g.owngoal&&g.name)ownGoals.push({name:g.name,match:`${m.team1} – ${m.team2}`})});
  });

  let rows='';
  scorers.forEach(([name,g],i)=>{
    const team=playerTeam[name]||wcScorerTeams[name]||null;
    rows+=`<tr${i===0?' style="background:rgba(246,212,90,.08)"':''}>
      <td class="td-pos ${i<3?'q':''}" style="font-size:16px">${i+1}</td>
      <td style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0;width:100%"><div style="display:flex;align-items:center;gap:.4rem">${team?flagEl(team,'sm'):''}<span style="font-size:24px">${name}</span></div></td>
      <td class="td-pts" style="font-size:16px">${g}</td>
    </tr>`;
  });

  let ownHtml='';
  if(ownGoals.length){
    ownHtml=`<div class="pixel-panel" style="margin-top:1rem"><div class="group-header">Selvmål</div><div style="padding:.4rem .65rem">`
      +ownGoals.map(o=>`<div style="font-size:15px;padding:2px 0;color:rgba(244,236,200,.6)">${o.name} <span style="color:rgba(244,236,200,.35);font-size:13px">(${o.match})</span></div>`).join('')
      +`</div></div>`;
  }

  el.innerHTML=`<div class="pixel-panel" style="margin-top:1rem">
    <div class="group-header">Toppscorere</div>
    <table class="st-tbl" style="width:100%">
      <thead><tr>
        <th>#</th><th style="text-align:left;padding-left:4px">Spiller</th>
        <th>Mål</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>${ownHtml}`;
}

/* ══ PLAYER STATS ══ */
let playerGoals={},wcScorers={},wcScorerTeams={};
function computeGoals(){
  const g={};
  allMatches.forEach(m=>{
    [...(m.goals1||[]),...(m.goals2||[])].forEach(({name,owngoal})=>{
      if(!name||owngoal)return;
      const k=name.toUpperCase();
      g[k]=(g[k]||0)+1;
    });
  });
  // Merge scorer API data — take maximum to avoid resetting API-sourced counts
  for(const[k,v] of Object.entries(wcScorers)){
    if((g[k]||0)<v)g[k]=v;
  }
  playerGoals=g;
  statLookup._cache=null;
}

let playerAssists={};
function computeAssists(){
  const a={};
  allMatches.forEach(m=>{
    [...(m.goals1||[]),...(m.goals2||[])].forEach(g=>{
      if(!g.assist||g.owngoal)return;
      const k=g.assist.toUpperCase();
      a[k]=(a[k]||0)+1;
    });
  });
  playerAssists=a;
}

let playerYellow={},playerRed={};
function computeCards(){
  const y={},r={};
  allMatches.forEach(m=>{
    [...(m.cards||m.bookings||[])].forEach(c=>{
      const name=c.name||c.player;if(!name)return;
      const k=name.toUpperCase();
      const type=(c.result||c.type||'').toLowerCase();
      if(type.includes('red')){r[k]=(r[k]||0)+1}
      else{y[k]=(y[k]||0)+1}
    });
  });
  playerYellow=y;playerRed=r;
}

let playerRatings={};
async function fetchPlayerRatings(){
  try{
    const sr=await fetch('https://api.sofascore.com/api/v1/unique-tournament/16/seasons',{mode:'cors'});
    if(!sr.ok)return;
    const sd=await sr.json();
    const s26=sd.seasons?.find(s=>s.year?.includes('2026')||(s.startDateTimestamp&&new Date(s.startDateTimestamp*1000).getFullYear()>=2026));
    if(!s26)return;
    const rr=await fetch(`https://api.sofascore.com/api/v1/unique-tournament/16/season/${s26.id}/top-players/rating?limit=200`,{mode:'cors'});
    if(!rr.ok)return;
    const rd=await rr.json();
    (rd.topPlayers||[]).forEach(e=>{
      if(e.player?.name&&e.statistics?.rating)
        playerRatings[e.player.name.toUpperCase()]=e.statistics.rating.toFixed(1);
    });
  }catch{}
}

/* Match modal: compact two-column list with small sprite */
function buildSwosSquad(t1,t2){
  if(!wc2026Players)return'';
  const s1=wc2026Players[swosTeam(t1)],s2=wc2026Players[swosTeam(t2)];
  if(!s1&&!s2)return'';
  const pc={GK:'swos-pos-GK',DEF:'swos-pos-DEF',MID:'swos-pos-MID',FWD:'swos-pos-FWD'};
  function col(sq){
    if(!sq)return`<div style="color:rgba(244,236,200,.3);font-size:13px;padding:.3rem 0">Ingen data</div>`;
    return sq.map(p=>{
      const g=playerGoals[p.n]||0;
      const badge=g?`<span class="swos-goal-badge">⚽ ${g}</span>`:'';
      return`<div class="swos-player-sm"><div class="swos-char-sm"></div><span class="swos-pos ${pc[p.p]||''}">${p.p}</span><span class="swos-pname">${p.n}${badge}</span></div>`;
    }).join('');
  }
  return`<div class="swos-section"><div class="ev-hdr">SWOS 2026 – TROPP</div><div class="swos-match-grid"><div><div class="swos-match-col-hdr">${flagEl(t1,'xs')}<span>${swosTeam(t1)}</span></div>${col(s1)}</div><div><div class="swos-match-col-hdr">${flagEl(t2,'xs')}<span>${swosTeam(t2)}</span></div>${col(s2)}</div></div></div>`;
}

/* ══ TEAM MODAL ══ */
function swosDisplayName(n){
  return n.split(' ').map(w=>w.charAt(0)+w.slice(1).toLowerCase()).join(' ');
}

/* Fuzzy stat lookup: normalize accents, then match by full name or surname */
function normStr(s){return s.replace(/[øØ]/g,'O').replace(/[åÅ]/g,'A').replace(/[æÆ]/g,'AE').replace(/[öÖ]/g,'O').replace(/[üÜ]/g,'U').replace(/[ñÑ]/g,'N').normalize('NFD').replace(/[̀-ͯ]/g,'').toUpperCase().trim()}
function statLookup(dict,fullName){
  if(dict[fullName])return dict[fullName];
  const norm=normStr(fullName);
  if(!statLookup._cache||statLookup._src!==dict){
    statLookup._src=dict;
    statLookup._cache={};
    for(const[k,v] of Object.entries(dict)) statLookup._cache[normStr(k)]=v;
  }
  return statLookup._cache[norm]||0;
}

function swosSquadRow(p,num,teamName){
  const pc={GK:'swos-pos-GK',DEF:'swos-pos-DEF',MID:'swos-pos-MID',FWD:'swos-pos-FWD'};
  const g=statLookup(playerGoals,p.n);
  const a=statLookup(playerAssists,p.n);
  const yc=statLookup(playerYellow,p.n);
  const rc=statLookup(playerRed,p.n);
  const rat=playerRatings[p.n]||null;
  const skin=p.skin||'Light';
  const hair=p.hair||'Black';
  const headShape={Light:1,Medium:0,Dark:2}[skin]??0;
  const sp=getKitSprite(skin,teamName);
  const fb=getKitSprite('Light','DEFAULT');
  const hc=`sprites/head-${headShape}-skin${skin}-hair${hair}.png`;
  const sprite=`<div class="swos-sprite-outer"><div class="swos-sprite-wrap"><img class="swos-char-sm" src="${sp}" onerror="if(!this._f){this._f=1;this.src='${fb}'}" alt=""></div><img class="swos-head-ovl" src="${hc}" alt=""></div>`;
  const badges=[
    g?`<span class="swos-sb g has">⚽ ${g}</span>`:'',
    a?`<span class="swos-sb a has">A ${a}</span>`:'',
    yc?`<span class="swos-sb yc has">Y ${yc}</span>`:'',
    rc?`<span class="swos-sb rc has">R ${rc}</span>`:'',
    rat?`<span class="swos-sb r has">★ ${rat}</span>`:'',
  ].filter(Boolean).join('');
  return`<div class="swos-squad-row">${sprite}<span class="swos-row-num">${num}</span><span class="swos-pos ${pc[p.p]||''}">${p.p}</span><span class="swos-row-name">${swosDisplayName(p.n)}</span><div class="swos-stat-grp">${badges}</div></div>`;
}

function openTeamModal(name){
  if(!name||name==='?')return;
  const gMatch=allMatches.find(m=>(m.team1===name||m.team2===name)&&m.group);
  const group=gMatch?gMatch.group:null;
  let standing=null;
  if(group){const st=calcStandings(group);standing=st.find(t=>t.n===name)}
  const teamMatches=allMatches.filter(m=>m.team1===name||m.team2===name);
  const sq=wc2026Players?wc2026Players[swosTeam(name)]:null;
  const groupLabel=group?group.replace('Group ','Gruppe '):'';
  const noName=tn(name);

  let groupTableHtml='';
  if(group){
    const st=calcStandings(group);
    const rows=st.map((t,i)=>{
      const isCur=t.n===name;
      return`<tr class="mgt-row${isCur?' mgt-cur':''}">
        <td class="mgt-pos">${i+1}</td>
        <td class="mgt-team" data-team="${t.n}">${flagEl(t.n,'xs')} <span>${tn(t.n)}</span></td>
        <td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}:${t.ga}</td>
        <td class="mgt-pts">${t.pts}</td>
      </tr>`;
    }).join('');
    groupTableHtml=`<table class="mini-grp-tbl"><thead><tr>
      <th></th><th class="mgt-th-team">${groupLabel}</th>
      <th>V</th><th>U</th><th>T</th><th>M</th><th>P</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
  }

  const matchesHtml=teamMatches.length
    ?`<div class="ev-section"><div class="ev-hdr">Kamper</div>${teamMatches.map(matchCardHtml).join('')}</div>`:'';

  const squadHtml=sq
    ?`<div class="swos-section"><div class="ev-hdr">SWOS 2026 – TROPP</div><div class="swos-squad-panel"><div class="swos-squad-list">${sq.map((p,i)=>swosSquadRow(p,i+1,name)).join('')}</div></div></div>`:'';

  document.getElementById('teamModalContent').innerHTML=`
    <div class="team-hdr-row">
      ${flagEl(name,'lg')}
      <div>
        <div class="modal-tname${name==='Norway'?' no':''}">${noName}</div>
      </div>
    </div>
    ${groupTableHtml}
    ${matchesHtml}
    ${squadHtml}`;
  document.getElementById('teamModal').style.zIndex='510';
  document.getElementById('matchModal').style.zIndex='504';
  document.getElementById('teamModal').style.display='flex';
  document.body.style.overflow='hidden';
}
function closeTeamModal(){
  document.getElementById('teamModal').style.display='none';
  document.body.style.overflow='';
}

/* ══ LOAD ══ */
async function loadData(){
  try{
    let all=cacheGet('wc_all',5*60*1000);
    if(!all){
      const res=await fetch(`${WCUP_URL}?action=all`);
      if(!res.ok)throw new Error();
      const data=await res.json();
      all=data.matches||[];
      if(all.length)cacheSet('wc_all',all);
    }
    allMatches=all.map(mapWCMatch);
    computeGoals();computeAssists();computeCards();
    document.getElementById('loading').style.display='none';
    showView('forside');
    fetchPlayerRatings();
    fetchWCScorers();
    startLivePolling();
  }catch{
    document.getElementById('loading').style.display='none';
    document.getElementById('errbox').style.display='block';
  }
}
loadData();

/* ── Pull-to-refresh for PWA ── */
(function(){
  let startY=0,pulling=false;
  document.addEventListener('touchstart',e=>{if(window.scrollY===0)startY=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchmove',e=>{
    if(startY>0&&window.scrollY===0&&e.touches[0].clientY-startY>80)pulling=true;
  },{passive:true});
  document.addEventListener('touchend',()=>{
    if(pulling){pulling=false;startY=0;localStorage.clear();location.reload();}
    startY=0;
  });
})();

/* ── Swipe mellom faner ── */
(function(){
  const VIEWS=['forside','kamper','kalender','grupper','sluttspill','statistikk'];
  let sx=0,sy=0;
  document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<55||Math.abs(dy)>Math.abs(dx)*0.65)return;
    if(document.getElementById('matchModal').style.display!=='none')return;
    if(document.getElementById('teamModal').style.display!=='none')return;
    const i=VIEWS.indexOf(currentView);if(i===-1)return;
    const ni=dx<0?Math.min(i+1,VIEWS.length-1):Math.max(i-1,0);
    if(ni!==i)showView(VIEWS[ni]);
  },{passive:true});
})();

/* ── Service Worker ── */
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');
